<body>
<div id="root"></div>
<script src="https://unpkg.com/preact@10.19.3/dist/preact.umd.js"></script>
<script src="https://unpkg.com/preact@10.19.3/hooks/dist/hooks.umd.js"></script>

<script>
// Samatha v4.7
const {useState,useEffect,useRef,useCallback}=preactHooks;
const html=htm.bind(preact.h);

const PRESETS=[15,30,45,60,90];
const MIN_RECORD_SEC=600;
const fmt=s=>String(Math.floor(s/60)).padStart(2,"0")+":"+String(Math.max(0,s)%60).padStart(2,"0");
const localDateStr=d=>d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
const todayStr=()=>{const d=new Date();if(d.getHours()<3)d.setDate(d.getDate()-1);return localDateStr(d);};
const getMondayStr=()=>{const d=new Date();if(d.getHours()<3)d.setDate(d.getDate()-1);const day=d.getDay();const diff=day===0?-6:1-day;d.setDate(d.getDate()+diff);return localDateStr(d);};
const getDayLabel=d=>["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][new Date(d).getDay()];
const calcBuffer=mins=>Math.round((60/Math.sqrt(15))*Math.sqrt(mins));
const vib=p=>{try{if(navigator.vibrate)navigator.vibrate(p);}catch{}};

function playEndBell(ctx,delayMs){
  if(!ctx)return;
  for(var i=0;i<5;i++)(function(i){setTimeout(function(){
    var osc=ctx.createOscillator(),gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(880,ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(660,ctx.currentTime+1.5);
    gain.gain.setValueAtTime(0.5,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+1.8);
    osc.start(ctx.currentTime);osc.stop(ctx.currentTime+2.0);
  },(delayMs||0)+i*1200);})(i);
}
function playBell(ctx,times){
  if(!ctx)return;
  for(var i=0;i<(times||1);i++)(function(i){setTimeout(function(){
    var osc=ctx.createOscillator(),gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(432,ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(320,ctx.currentTime+2.0);
    gain.gain.setValueAtTime(0.35,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+2.2);
    osc.start(ctx.currentTime);osc.stop(ctx.currentTime+2.5);
  },i*800);})(i);
}

const MOUNTAIN_ROWS=44;
const MOUNTAIN_SIZE=MOUNTAIN_ROWS*(MOUNTAIN_ROWS+1)/2;
const MOUNTAIN_SLOTS=(function(){var s=[];for(var r=0;r<MOUNTAIN_ROWS;r++){var w=MOUNTAIN_ROWS-r;for(var c=0;c<w;c++)s.push({row:r,col:c,width:w});}return s;})();
const GRAIN_COLORS=["#7dd3fc","#93c5fd","#a5f3fc","#bae6fd","#67e8f9","#38bdf8"];
const COMPLETE_COLORS=["#e8d4a8","#c9a87a","#f0e0b8","#d4b896","#e8c87a","#c9a070"];

function DustMountain(props){
  var totalMinutes=props.totalMinutes,totalAll=props.totalAll;
  var shimmerState=useState(false);
  var shimmer=shimmerState[0],setShimmer=shimmerState[1];
  var totalGrains=Math.floor(totalMinutes/10);
  var completed=Math.floor(totalGrains/MOUNTAIN_SIZE);
  var rem=totalGrains%MOUNTAIN_SIZE;
  var CELL=6,GAP=1;
  var justCompleted=rem===0&&completed>0;
  var achieved1000=totalAll>=3600000;
  useEffect(function(){
    if(justCompleted||achieved1000){setShimmer(true);var t=setTimeout(function(){setShimmer(false);},3000);return function(){clearTimeout(t);};}
  },[completed,achieved1000]);
  var gc=shimmer?COMPLETE_COLORS:GRAIN_COLORS;
  var borderCol=shimmer?"#5a4a2a":"#1a1610";
  var titleCol=shimmer?"#c9a87a":"#4a3a2a";
  var barBg=shimmer?"linear-gradient(to right,#c9a87a,#e8d4a8)":"linear-gradient(to right,#38bdf8,#7dd3fc)";
  var barW=(justCompleted?100:(rem/MOUNTAIN_SIZE)*100)+"%";
  return html`
    <div style=${{background:"#0f0e0a",border:"1px solid "+borderCol,borderRadius:8,padding:"20px 16px",marginBottom:24}}>
      <div style=${{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:16}}>
        <div style=${{fontSize:11,letterSpacing:2,color:titleCol}}>チリツモ山</div>
        <div style=${{fontSize:12,color:"#3a4a5a",letterSpacing:1}}>
          ${completed>0&&html`<span style=${{color:shimmer?"#e8d4a8":"#7dd3fc",marginRight:8}}>${completed+1}山目</span>`}
          ${totalGrains.toLocaleString()}粒 · ${Math.floor(totalMinutes/60)>0?Math.floor(totalMinutes/60)+"時間":""}${Math.round(totalMinutes%60)}分
        </div>
      </div>
      ${shimmer&&html`<div style=${{textAlign:"center",marginBottom:12,fontSize:12,letterSpacing:2,color:"#c9a87a"}}>${achieved1000?"✦ 1000時間達成 ✦":"✦ 山ひとつ完成 ✦"}</div>`}
      <div style=${{position:"relative",height:MOUNTAIN_ROWS*(CELL+GAP),display:"flex",justifyContent:"center"}}>
        <div style=${{position:"relative",width:MOUNTAIN_ROWS*(CELL+GAP)}}>
          ${MOUNTAIN_SLOTS.map(function(slot,i){
            var filled=justCompleted?true:i<rem;
            var x=(slot.col+(MOUNTAIN_ROWS-slot.width)/2)*(CELL+GAP);
            var y=(MOUNTAIN_ROWS-1-slot.row)*(CELL+GAP);
            var color=filled?gc[i%gc.length]:"#1a1814";
            var shadow=filled?"0 0 "+(shimmer?8:4)+"px "+color+(shimmer?"99":"66"):"none";
            return html`<div key=${i} style=${{position:"absolute",left:x,top:y,width:CELL,height:CELL,borderRadius:2,background:color,opacity:filled?(shimmer?1:0.85):0.4,boxShadow:shadow}}/>`;
          })}
        </div>
      </div>
      <div style=${{marginTop:14}}>
        <div style=${{height:2,background:"#1a1814",borderRadius:1,overflow:"hidden"}}>
          <div style=${{height:"100%",width:barW,background:barBg,borderRadius:1}}/>
        </div>
        ${!justCompleted&&html`<div style=${{fontSize:10,color:"#2a3a4a",marginTop:6,textAlign:"right"}}>次の山まで ${MOUNTAIN_SIZE-rem}粒 (${Math.round((MOUNTAIN_SIZE-rem)*10/60)}時間${Math.round((MOUNTAIN_SIZE-rem)*10%60)}分)</div>`}
      </div>
    </div>
  `;
}

var getPhase=function(e,buf,main){return e<buf?"prep":"main";};
var getPhaseDisplay=function(e,buf,main){var p=getPhase(e,buf,main);return{phase:p,remaining:p==="prep"?buf-e:buf+main-e};};
var PHASE_LABELS={prep:"準備",main:"瞑想"};
var PHASE_COLORS={prep:"#7a8a9a",main:"#c9a87a"};

function App(){
  var s0=useState(function(){try{var s=localStorage.getItem("samatha_sessions");return s?JSON.parse(s):[];}catch(e){return[];}});
  var sessions=s0[0],setSessions=s0[1];
  var s1=useState(30);var preset=s1[0],setPreset=s1[1];
  var s2=useState(false);var running=s2[0],setRunning=s2[1];
  var s3=useState(0);var elapsed=s3[0],setElapsed=s3[1];
  var s4=useState(false);var finished=s4[0],setFinished=s4[1];
  var s5=useState("timer");var view=s5[0],setView=s5[1];
  var s6=useState(false);var dimmed=s6[0],setDimmed=s6[1];
  var s7=useState(false);var bellTesting=s7[0],setBellTesting=s7[1];
  var s8=useState(null);var pendingSession=s8[0],setPendingSession=s8[1];
  var s9=useState(60);var dailyGoal=s9[0],setDailyGoal=s9[1];
  var s10=useState(30);var amGoal=s10[0],setAmGoal=s10[1];
  var s11=useState(30);var pmGoal=s11[0],setPmGoal=s11[1];
  var s12=useState(null);var weeklyGoal=s12[0],setWeeklyGoal=s12[1];
  var s13=useState(false);var confirmingGoal=s13[0],setConfirmingGoal=s13[1];
  var s14=useState(false);var showSplitInfo=s14[0],setShowSplitInfo=s14[1];
  var s15=useState(false);var showBackupInfo=s15[0],setShowBackupInfo=s15[1];
  var s16=useState(function(){var d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");});
  var calendarMonth=s16[0],setCalendarMonth=s16[1];
  var s17=useState(null);var selectedDate=s17[0],setSelectedDate=s17[1];
  var s18=useState(function(){try{var n=localStorage.getItem("samatha_night_mode");return n?JSON.parse(n).enabled:false;}catch(e){return false;}});
  var nightMode=s18[0],setNightMode=s18[1];
  var s19=useState(function(){try{var n=localStorage.getItem("samatha_night_mode");return n?JSON.parse(n).start:2;}catch(e){return 2;}});
  var nightStart=s19[0],setNightStart=s19[1];
  var s20=useState(function(){try{var n=localStorage.getItem("samatha_night_mode");return n?JSON.parse(n).end:4;}catch(e){return 4;}});
  var nightEnd=s20[0],setNightEnd=s20[1];
  var s21=useState(function(){try{return JSON.parse(localStorage.getItem("samatha_auto_backup")||"false");}catch(e){return false;}});
  var autoBackup=s21[0],setAutoBackup=s21[1];

  var iRef=useRef(null),audioRef=useRef(null),wlRef=useRef(null);
  var tsRef=useRef(null),pausedRef=useRef(0),bellsRef=useRef(new Set()),runRef=useRef(false);
  var elapsedRef=useRef(0),presetRef=useRef(30);
  var sessionDateRef=useRef(todayStr()),sessionStartRef=useRef(null);
  var lpTimer=useRef(null),lpInterval=useRef(null);
  var lpTimer2=useRef(null),lpInterval2=useRef(null);
  var lpTimer3=useRef(null),lpInterval3=useRef(null);
  var lpTimer4=useRef(null),lpInterval4=useRef(null);
  var dailyGoalRef=useRef(60);

  function makeLongPress(fn,t,i){
    return {
      onTouchStart:function(e){e.preventDefault();if(t.current||i.current)return;fn();t.current=setTimeout(function(){i.current=setInterval(fn,300);},600);},
      onTouchEnd:function(){clearTimeout(t.current);clearInterval(i.current);t.current=null;i.current=null;},
      onTouchCancel:function(){clearTimeout(t.current);clearInterval(i.current);t.current=null;i.current=null;},
    };
  }

  useEffect(function(){runRef.current=running;},[running]);
  useEffect(function(){elapsedRef.current=elapsed;},[elapsed]);
  useEffect(function(){presetRef.current=preset;},[preset]);
  useEffect(function(){dailyGoalRef.current=dailyGoal;},[dailyGoal]);

  useEffect(function(){
    try{
      var wg=localStorage.getItem("samatha_weekly_goal");
      if(wg){var parsed=JSON.parse(wg);if(parsed.weekStart===getMondayStr()){setWeeklyGoal(parsed);setDailyGoal(parsed.dailyGoal);setAmGoal(parsed.amGoal);setPmGoal(parsed.pmGoal);dailyGoalRef.current=parsed.dailyGoal;}}
    }catch(e){}
  },[]);

  function save(arr){setSessions(arr);localStorage.setItem("samatha_sessions",JSON.stringify(arr));}

  function saveWeeklyGoal(dg,am,pm){
    var wg={dailyGoal:dg,amGoal:am,pmGoal:pm,weekStart:getMondayStr()};
    setWeeklyGoal(wg);setDailyGoal(dg);setAmGoal(am);setPmGoal(pm);dailyGoalRef.current=dg;
    localStorage.setItem("samatha_weekly_goal",JSON.stringify(wg));
    try{var hist=JSON.parse(localStorage.getItem("samatha_weekly_history")||"[]");var filtered=hist.filter(function(h){return h.weekStart!==wg.weekStart;});localStorage.setItem("samatha_weekly_history",JSON.stringify(filtered.concat([wg])));}catch(e){}
  }

  function saveNightMode(enabled,start,end){
    setNightMode(enabled);setNightStart(start);setNightEnd(end);
    localStorage.setItem("samatha_night_mode",JSON.stringify({enabled:enabled,start:start,end:end}));
  }

  function isNightTime(){
    if(!nightMode)return false;
    var h=new Date().getHours()+new Date().getMinutes()/60;
    if(nightStart>nightEnd)return h>=nightStart||h<nightEnd;
    return h>=nightStart&&h<nightEnd;
  }

  function getAchievement(amSec,pmSec,wg){
    if(!wg)return null;
    var amDone=amSec>=wg.amGoal*60,pmDone=pmSec>=wg.pmGoal*60,totalDone=(amSec+pmSec)>=wg.dailyGoal*60;
    if(amDone&&pmDone)return"complete";
    if(totalDone)return"partial";
    return"none";
  }

  function getAudio(){if(!audioRef.current)audioRef.current=new(window.AudioContext||window.webkitAudioContext)();return audioRef.current;}
  async function acquireWL(){try{if("wakeLock"in navigator)wlRef.current=await navigator.wakeLock.request("screen");}catch(e){}}
  function releaseWL(){try{if(wlRef.current)wlRef.current.release();}catch(e){}wlRef.current=null;}

  var bufSec=calcBuffer(preset),mainSec=preset*60,totalSec=bufSec+mainSec;

  function buildSessionMeta(duration,presetVal){
    var sd=new Date(sessionStartRef.current||Date.now());
    return{startTime:sd.toISOString(),dayOfWeek:sd.getDay(),hourOfDay:sd.getHours(),completionRate:Math.round(duration/(presetVal*60)*100),bufferSec:calcBuffer(presetVal)};
  }

  var tick=useCallback(function(){
    if(!tsRef.current)return;
    var e=pausedRef.current+Math.floor((Date.now()-tsRef.current)/1000);
    setElapsed(e);
    var fired=bellsRef.current,ph=getPhase(e,bufSec,mainSec);
    if(ph==="main"&&!fired.has("main")){fired.add("main");playBell(audioRef.current||getAudio(),1);vib([200,100,200]);}
    if(e>=totalSec){setRunning(false);setFinished(true);setDimmed(false);clearInterval(iRef.current);iRef.current=null;releaseWL();playEndBell(audioRef.current||getAudio());vib([300,100,300,100,500]);}
  },[bufSec,mainSec,totalSec]);

  useEffect(function(){
    if(running){tsRef.current=Date.now();iRef.current=setInterval(tick,250);}
    else{clearInterval(iRef.current);iRef.current=null;}
    return function(){clearInterval(iRef.current);iRef.current=null;};
  },[running,tick]);

  useEffect(function(){
    var handler=async function(){
      if(document.hidden&&runRef.current){
        setRunning(false);setDimmed(false);releaseWL();
        var me=Math.max(0,elapsedRef.current-bufSec);
        pausedRef.current=0;tsRef.current=null;bellsRef.current=new Set();
        setElapsed(0);setFinished(false);
        if(me>=MIN_RECORD_SEC)setPendingSession({duration:me,preset:presetRef.current,date:sessionDateRef.current,meta:buildSessionMeta(me,presetRef.current)});
      }else if(!document.hidden&&runRef.current){await acquireWL();}
    };
    document.addEventListener("visibilitychange",handler);
    return function(){document.removeEventListener("visibilitychange",handler);};
  },[bufSec]);

  async function handleStart(){
    try{getAudio().resume();}catch(e){}
    pausedRef.current=0;tsRef.current=null;bellsRef.current=new Set();
    sessionDateRef.current=todayStr();sessionStartRef.current=Date.now();
    setElapsed(0);setFinished(false);setDimmed(true);
    setTimeout(function(){playBell(audioRef.current||getAudio(),1);},200);
    setTimeout(function(){vib([100]);},200);
    await acquireWL();setRunning(true);
  }
  function handleStop(){
    setRunning(false);setDimmed(false);releaseWL();
    var me=Math.max(0,elapsed-bufSec);
    pausedRef.current=0;tsRef.current=null;bellsRef.current=new Set();
    setElapsed(0);setFinished(false);
    if(me>=MIN_RECORD_SEC)setPendingSession({duration:me,preset:preset,date:sessionDateRef.current,meta:buildSessionMeta(me,preset)});
  }
  function doAutoBackup(arr){
    if(!autoBackup)return;
    var last=parseInt(localStorage.getItem("samatha_last_backup")||"0");
    if(Date.now()-last<22*60*60*1000)return;
    var blob=new Blob([JSON.stringify(arr,null,2)],{type:"application/json"});
    var url=URL.createObjectURL(blob);
    var a=document.createElement("a");
    a.href=url;a.download="samatha_backup_"+todayStr()+".json";a.click();
    URL.revokeObjectURL(url);
    localStorage.setItem("samatha_last_backup",Date.now().toString());
  }
  function handleSave(){
    var meta=buildSessionMeta(mainSec,preset);
    pausedRef.current=0;tsRef.current=null;bellsRef.current=new Set();
    setElapsed(0);setFinished(false);
    var newS=[Object.assign({id:Date.now(),date:sessionDateRef.current,duration:mainSec,preset:preset},meta)].concat(sessions);
    save(newS);doAutoBackup(newS);
  }
  function handlePendingSave(){
    if(!pendingSession)return;
    var entry=Object.assign({id:Date.now(),date:pendingSession.date||sessionDateRef.current,duration:pendingSession.duration,preset:pendingSession.preset},pendingSession.meta||buildSessionMeta(pendingSession.duration,pendingSession.preset));
    var newS=[entry].concat(sessions);
    save(newS);setPendingSession(null);doAutoBackup(newS);
  }
  function handleDeleteSession(id){save(sessions.filter(function(s){return s.id!==id;}));}

  var pd=getPhaseDisplay(elapsed,bufSec,mainSec);
  var phase=pd.phase,remaining=pd.remaining;
  var phaseColor=PHASE_COLORS[phase]||"#c9a87a";
  var pp=phase==="prep"?elapsed/bufSec:(elapsed-bufSec)/mainSec;
  var R=110,C=2*Math.PI*R,dO=C*(1-Math.min(pp,1));

  var byDate=sessions.reduce(function(a,s){a[s.date]=(a[s.date]||0)+s.duration;return a;},{});
  var last14=Array.from({length:14},function(_,i){var d=new Date();d.setDate(d.getDate()-(13-i));return localDateStr(d);});
  var todayTotal=byDate[todayStr()]||0;
  var weekDaysElapsed=(function(){var mon=new Date(getMondayStr());var today=new Date(todayStr());return Math.min(7,Math.round((today-mon)/(1000*60*60*24))+1);})();
  var weekTotal=(function(){var mon=new Date(getMondayStr());var days=[];for(var i=0;i<weekDaysElapsed;i++){var d=new Date(mon);d.setDate(mon.getDate()+i);days.push(localDateStr(d));}return days.reduce(function(a,d){return a+(byDate[d]||0);},0);})();
  var totalAll=sessions.reduce(function(a,s){return a+s.duration;},0);
  var monthTotal=(function(){var d=new Date();if(d.getHours()<3)d.setDate(d.getDate()-1);var prefix=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");return Object.entries(byDate).filter(function(e){return e[0].startsWith(prefix);}).reduce(function(a,e){return a+e[1];},0);})();
  function isAM(s){var h=new Date(s.startTime||0).getHours();return h>=3&&h<12;}
  var todaySessions=sessions.filter(function(s){return s.date===todayStr();});
  var amTotal=todaySessions.filter(function(s){return s.startTime&&isAM(s);}).reduce(function(a,s){return a+s.duration;},0);
  var pmTotal=todaySessions.filter(function(s){return s.startTime&&!isAM(s);}).reduce(function(a,s){return a+s.duration;},0);
  var todayAchievement=getAchievement(amTotal,pmTotal,weeklyGoal);
  var thisWeekDays=(function(){var monday=getMondayStr();var days=[];var cur=new Date(monday);var today=new Date(todayStr());while(cur<=today){days.push(localDateStr(cur));cur.setDate(cur.getDate()+1);}return days;})();
  var weekAchievements=weeklyGoal?thisWeekDays.map(function(date){var ds=sessions.filter(function(s){return s.date===date;});var da=ds.filter(function(s){return s.startTime&&isAM(s);}).reduce(function(a,s){return a+s.duration;},0);var dp=ds.filter(function(s){return s.startTime&&!isAM(s);}).reduce(function(a,s){return a+s.duration;},0);return getAchievement(da,dp,weeklyGoal);}):[];
  var weekComplete=weekAchievements.filter(function(a){return a==="complete";}).length;
  var weekPartial=weekAchievements.filter(function(a){return a==="partial";}).length;
  var streak=(function(){var s=0,d=new Date();if(d.getHours()<3)d.setDate(d.getDate()-1);while(byDate[localDateStr(d)]){s++;d.setDate(d.getDate()-1);}return s;})();
  var bestStreak=(function(){var dates=Object.keys(byDate).sort();var best=0,cur=0,prev=null;for(var i=0;i<dates.length;i++){var dt=dates[i];if(prev){var p=new Date(prev);p.setDate(p.getDate()+1);cur=localDateStr(p)===dt?cur+1:1;}else{cur=1;}best=Math.max(best,cur);prev=dt;}return best;})();
  var last14Avg=Math.round(last14.reduce(function(a,d){return a+(byDate[d]||0);},0)/60/14);
  var weekAvg=Math.round(weekTotal/60/weekDaysElapsed);

                    <div style=${{display:"flex",alignItems:"center",gap:8}}>
                      <button onClick=${function(){setShowSplitInfo(true);}} style=${{background:"none",border:"1px solid #2a2520",color:"#4a3a2a",borderRadius:"50%",width:18,height:18,cursor:"pointer",fontSize:10,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>?</button>
                      <div style=${{fontSize:10,color:"#3a3020",letterSpacing:1}}>🔒 ${weeklyGoal.weekStart}〜</div>
                    </div>
                  </div>
                  <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
                    ${[{l:"1日",v:dailyGoal},{l:"前半",v:amGoal},{l:"後半",v:pmGoal}].map(function(item){return html`
                      <div key=${item.l} style=${{background:"#0d0c09",border:"1px solid #1e1a16",borderRadius:6,padding:"8px",textAlign:"center"}}>
                        <div style=${{fontSize:9,letterSpacing:2,color:"#3a3020",marginBottom:4}}>${item.l}</div>
                        <div style=${{fontSize:18,fontWeight:300,color:"#a89070"}}>${item.v}<span style=${{fontSize:10,color:"#3a3020"}}>分</span></div>
                      </div>
                    `;})}
                  </div>
                  <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                    ${[{label:"前半",total:amTotal,goal:amGoal},{label:"後半",total:pmTotal,goal:pmGoal}].map(function(item){return html`
                      <div key=${item.label}>
                        <div style=${{height:2,background:"#1a1814",borderRadius:1,overflow:"hidden"}}>
                          <div style=${{height:"100%",width:(Math.min(item.total/(item.goal*60)||0,1)*100)+"%",background:"linear-gradient(to right,#c9a87a,#e8d4a8)",borderRadius:1}}/>
                        </div>
                        <div style=${{fontSize:9,color:"#3a3020",marginTop:3,textAlign:"right"}}>${Math.round(item.total/60)}分 / ${item.goal}分</div>
                      </div>
                    `;})}
                  </div>
                </div>
              `}
            </div>

            <div style=${{background:"#0f0e0a",border:"1px solid #1a1610",borderRadius:8,padding:"20px 16px",marginBottom:24}}>
              <div style=${{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:16}}>
                <div style=${{fontSize:11,letterSpacing:2,color:"#4a3a2a"}}>過去14日間</div>
                <div style=${{fontSize:10,color:"#3a4a5a",letterSpacing:1}}>平均 <span style=${{color:"#6a7a5a",fontSize:13}}>${last14Avg}</span>分/日</div>
              </div>
              <svg width="100%" height="100" viewBox="0 0 280 100" preserveAspectRatio="none" style=${{overflow:"visible"}}>
                <line x1="0" y1=${avgY} x2="280" y2=${avgY} stroke="#4a5a3a" strokeWidth="1" strokeDasharray="4 3" opacity="0.6"/>
                <polyline fill="none" stroke="#5a4a30" strokeWidth="1.5" strokeLinejoin="round" points=${linePoints}/>
                ${todayIdx>=0&&html`<circle cx=${(todayIdx/(last14Points.length-1))*280} cy=${toY(last14Points[todayIdx])} r="4" fill="#c9a87a" style=${{filter:"drop-shadow(0 0 4px #c9a87a88)"}}/>`}
                ${last14Points.map(function(v,i){var x=(i/(last14Points.length-1))*280,y=toY(v),it=last14[i]===todayStr();return v>0&&!it?html`<circle key=${i} cx=${x} cy=${y} r="2.5" fill="#3a3020" stroke="#5a4a30" strokeWidth="1"/>`:null;})}
                ${last14.map(function(date,i){var it=date===todayStr();return(i%2===0||it)?html`<text key=${i} x=${(i/(last14.length-1))*280} y="94" textAnchor="middle" fontSize="8" fill=${it?"#c9a87a":"#3a2a1a"}>${getDayLabel(date)}</text>`:null;})}
              </svg>
            </div>

            <${DustMountain} totalMinutes=${Math.floor(totalAll/60)} totalAll=${totalAll}/>

            <div style=${{background:"#0f0e0a",border:"1px solid #1a1610",borderRadius:8,padding:"16px",marginBottom:24}}>
              <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <button onClick=${prevMonth} disabled=${!canPrev} style=${{background:"none",border:"none",color:canPrev?"#5a4a3a":"#2a2020",cursor:canPrev?"pointer":"default",fontSize:16,padding:"0 8px"}}>‹</button>
                <div style=${{fontSize:11,letterSpacing:2,color:"#4a3a2a"}}>${cy}年 ${cm}月</div>
                <button onClick=${nextMonth} disabled=${!canNext} style=${{background:"none",border:"none",color:canNext?"#5a4a3a":"#2a2020",cursor:canNext?"pointer":"default",fontSize:16,padding:"0 8px"}}>›</button>
              </div>
              <div style=${{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>
                ${["日","月","火","水","木","金","土"].map(function(d){return html`<div key=${d} style=${{textAlign:"center",fontSize:9,color:"#3a3020",padding:"2px 0"}}>${d}</div>`;})}
              </div>
              <div style=${{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
                ${Array.from({length:firstDow},function(_,i){return html`<div key=${"e"+i}/>`;}).concat(calDays.map(function(item){
                  var dateStr=item.dateStr,mins=item.mins;
                  var isToday=dateStr===todayStr();
                  var isSel=dateStr===selectedDate;
                  var hasSessions=mins>0;
                  var bg=isSel?"#c9a87a":hasSessions?"#2a2010":isToday?"#0f0e0a":"none";
                  var border=isToday&&!hasSessions?"1px solid #3a3020":"1px solid transparent";
                  var numCol=isSel?"#09090f":hasSessions?"#c9a87a":isToday?"#a89070":"#2a2020";
                  return html`
                    <div key=${dateStr} onClick=${function(){setSelectedDate(isSel?null:dateStr);}}
                      style=${{aspectRatio:"1",display:"flex",alignItems:"center",justifyContent:"center",borderRadius:4,cursor:hasSessions?"pointer":"default",background:bg,border:border}}>
                      <div style=${{fontSize:11,color:numCol}}>${parseInt(dateStr.slice(8))}</div>
                    </div>
                  `;
                }))}
              </div>
              ${selectedDate&&selectedSessions.length>0&&html`
                <div style=${{marginTop:12,borderTop:"1px solid #1e1a16",paddingTop:12}}>
                  <div style=${{fontSize:9,letterSpacing:2,color:"#3a3020",marginBottom:8}}>${selectedDate}</div>
                  <div style=${{display:"flex",flexDirection:"column",gap:4}}>
                    ${selectedSessions.map(function(s,i){
                      var st=s.startTime?new Date(s.startTime):null;
                      var timeStr=st?String(st.getHours()).padStart(2,"0")+":"+String(st.getMinutes()).padStart(2,"0"):"--:--";
                      return html`
                        <div key=${i} style=${{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 10px",background:"#0d0c09",borderRadius:4}}>
                          <div style=${{fontSize:11,color:"#5a4a3a"}}>${timeStr}</div>
                          <div style=${{fontSize:15,color:"#a89070",fontWeight:300}}>${Math.round(s.duration/60)}<span style=${{fontSize:11,color:"#5a4a3a"}}>分</span></div>
                        </div>
                      `;
                    })}
                    <div style=${{fontSize:10,color:"#3a3020",textAlign:"right",marginTop:2}}>合計 ${selectedSessions.reduce(function(a,s){return a+Math.round(s.duration/60);},0)}分</div>
                  </div>
                </div>
              `}
            </div>

            <div style=${{fontSize:11,letterSpacing:2,color:"#4a3a2a",marginBottom:12}}>履歴</div>
            ${sessions.length===0?html`
              <div style=${{color:"#3a2a1a",fontSize:14,textAlign:"center",padding:20}}>まだ記録がありません</div>
            `:html`
              <div style=${{display:"flex",flexDirection:"column",gap:6}}>
                ${sessions.slice(0,3).map(function(s){return html`
                  <div key=${s.id} style=${{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",background:"#0f0e0a",border:"1px solid #1a1610",borderRadius:6}}>
                    <div style=${{color:"#5a4a3a",fontSize:13}}>${s.date}</div>
                    <div style=${{display:"flex",alignItems:"center",gap:12}}>
                      <div style=${{color:"#a89070",fontSize:18}}>${Math.round(s.duration/60)}<span style=${{fontSize:12,color:"#5a4a3a"}}>分</span></div>
                      <button onClick=${function(){handleDeleteSession(s.id);}} style=${{background:"none",border:"none",color:"#3a2520",cursor:"pointer",fontSize:16,lineHeight:1,padding:"2px 4px"}}>×</button>
                    </div>
                  </div>
                `;})}
              </div>
            `}

            <div style=${{marginTop:32,paddingTop:24,borderTop:"1px solid #1a1610",display:"flex",flexDirection:"column",gap:10}}>
              <div style=${{fontSize:11,letterSpacing:2,color:"#2a2018",marginBottom:4}}>設定</div>
              <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                <div style=${{display:"flex",alignItems:"center",gap:6}}>
                  <div style=${{fontSize:11,color:"#3a3020",letterSpacing:1}}>定期バックアップ</div>
                  <button onClick=${function(){setShowBackupInfo(true);}} style=${{background:"none",border:"1px solid #2a2520",color:"#4a3a2a",borderRadius:"50%",width:16,height:16,cursor:"pointer",fontSize:9,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>?</button>
                </div>
                <button onClick=${function(){var v=!autoBackup;setAutoBackup(v);localStorage.setItem("samatha_auto_backup",JSON.stringify(v));}} style=${{background:autoBackup?"#1a1510":"none",border:"1px solid "+(autoBackup?"#c9a87a":"#2a2520"),color:autoBackup?"#c9a87a":"#4a3a2a",borderRadius:4,padding:"3px 12px",cursor:"pointer",fontSize:11}}>${autoBackup?"ON":"OFF"}</button>
              </div>
              <div style=${{display:"flex",gap:8,flexWrap:"wrap"}}>
                <button onClick=${function(){var blob=new Blob([JSON.stringify(sessions,null,2)],{type:"application/json"});var url=URL.createObjectURL(blob);var a=document.createElement("a");a.href=url;a.download="samatha_backup_"+todayStr()+".json";a.click();URL.revokeObjectURL(url);}} style=${{background:"none",border:"1px solid #2a2520",color:"#5a4a3a",borderRadius:4,padding:"7px 16px",cursor:"pointer",fontSize:13,letterSpacing:1}}>↓ エクスポート</button>
                <label style=${{background:"none",border:"1px solid #2a2520",color:"#5a4a3a",borderRadius:4,padding:"7px 16px",cursor:"pointer",fontSize:13,letterSpacing:1}}>
                  ↑ インポート
                  <input type="file" accept=".json" style=${{display:"none"}} onChange=${function(e){var file=e.target.files[0];if(!file)return;var reader=new FileReader();reader.onload=function(ev){try{var imported=JSON.parse(ev.target.result);if(Array.isArray(imported)){save(imported);alert(imported.length+"件インポートしました");}}catch(err){alert("読み込みに失敗しました");}};reader.readAsText(file);e.target.value="";}}/>
                </label>
                <button onClick=${function(){if(bellTesting)return;setBellTesting(true);try{getAudio().resume();}catch(e){}playEndBell(audioRef.current||getAudio(),3000);setTimeout(function(){setBellTesting(false);},3000+5*1200+500);}} style=${{background:"none",border:"1px solid #2a2520",color:bellTesting?"#2a2520":"#5a4a3a",borderRadius:4,padding:"7px 16px",cursor:bellTesting?"not-allowed":"pointer",fontSize:13,letterSpacing:1}}>🔔 ${bellTesting?"確認中...":"アラーム確認"}</button>
              </div>
            </div>
          </div>
        `}
      </div>

      ${showBackupInfo&&html`
        <div style=${{position:"fixed",inset:0,background:"rgba(0,0,0,.8)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:24}} onClick=${function(){setShowBackupInfo(false);}}>
          <div style=${{background:"#0f0e0a",border:"1px solid #2a2520",borderRadius:12,padding:"28px 24px",width:"100%",maxWidth:320}} onClick=${function(e){e.stopPropagation();}}>
            <div style=${{fontSize:11,letterSpacing:3,color:"#5a4a3a",marginBottom:16}}>定期バックアップ</div>
            <div style=${{fontSize:12,color:"#5a4a3a",lineHeight:1.8,marginBottom:24}}>セッション保存時に前回のバックアップから22時間以上経過していた場合、自動でJSONファイルをダウンロードします。ダウンロードしたファイルは設定画面からインポートできます。</div>
            <div style=${{display:"flex",justifyContent:"center"}}>
              <button className="ab x" onClick=${function(){setShowBackupInfo(false);}}>閉じる</button>
            </div>
          </div>
        </div>
      `}

      ${showSplitInfo&&html`
        <div style=${{position:"fixed",inset:0,background:"rgba(0,0,0,.8)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:24}} onClick=${function(){setShowSplitInfo(false);}}>
          <div style=${{background:"#0f0e0a",border:"1px solid #2a2520",borderRadius:12,padding:"28px 24px",width:"100%",maxWidth:320}} onClick=${function(e){e.stopPropagation();}}>
            <div style=${{fontSize:11,letterSpacing:3,color:"#5a4a3a",marginBottom:20}}>時間帯の定義</div>
            <div style=${{display:"flex",flexDirection:"column",gap:12,marginBottom:24}}>
              ${[{l:"1日の区切り",v:"午前3時 〜 翌午前2時59分",d:"深夜2時まで「今日」として扱います"},{l:"前半",v:"午前3時 〜 午前11時59分",d:"朝の瞑想"},{l:"後半",v:"正午 〜 翌午前2時59分",d:"昼・夜の瞑想"}].map(function(item){return html`
                <div key=${item.l} style=${{background:"#0d0c09",border:"1px solid #1e1a16",borderRadius:6,padding:"10px 14px"}}>
                  <div style=${{fontSize:9,letterSpacing:2,color:"#3a3020",marginBottom:4}}>${item.l}</div>
                  <div style=${{fontSize:13,color:"#a89070"}}>${item.v}</div>
                  <div style=${{fontSize:10,color:"#3a3020",marginTop:3}}>${item.d}</div>
                </div>
              `;})}
            </div>
            <div style=${{display:"flex",justifyContent:"center"}}>
              <button className="ab x" onClick=${function(){setShowSplitInfo(false);}}>閉じる</button>
            </div>
          </div>
        </div>
      `}

      ${confirmingGoal&&html`
        <div style=${{position:"fixed",inset:0,background:"rgba(0,0,0,.8)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div style=${{background:"#0f0e0a",border:"1px solid #2a2520",borderRadius:12,padding:"32px 24px",width:"100%",maxWidth:320,textAlign:"center"}}>
            <div style=${{fontSize:11,letterSpacing:3,color:"#5a4a3a",marginBottom:20}}>今週の目標</div>
            <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:20}}>
              ${[{l:"1日",v:dailyGoal},{l:"前半",v:amGoal},{l:"後半",v:pmGoal}].map(function(item){return html`
                <div key=${item.l} style=${{background:"#0d0c09",border:"1px solid #1e1a16",borderRadius:6,padding:"10px 6px",textAlign:"center"}}>
                  <div style=${{fontSize:9,letterSpacing:2,color:"#3a3020",marginBottom:4}}>${item.l}</div>
                  <div style=${{fontSize:22,fontWeight:300,color:"#c9a87a"}}>${item.v}<span style=${{fontSize:10,color:"#5a4a3a"}}>分</span></div>
                </div>
              `;})}
            </div>
            <div style=${{fontSize:11,color:"#3a3020",marginBottom:24,letterSpacing:1}}>この内容で今週の目標を確定しますか？確定後は翌月曜まで変更できません。</div>
            <div style=${{display:"flex",gap:12,justifyContent:"center"}}>
              <button className="ab sv" onClick=${function(){saveWeeklyGoal(dailyGoal,amGoal,pmGoal);setConfirmingGoal(false);}}>確定</button>
              <button className="ab x" onClick=${function(){setConfirmingGoal(false);}}>戻る</button>
            </div>
          </div>
        </div>
      `}

      ${pendingSession&&html`
        <div style=${{position:"fixed",inset:0,background:"rgba(0,0,0,.7)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div style=${{background:"#0f0e0a",border:"1px solid #2a2520",borderRadius:12,padding:"32px 24px",width:"100%",maxWidth:320,textAlign:"center"}}>
            <div style=${{fontSize:11,letterSpacing:3,color:"#5a4a3a",marginBottom:16}}>セッション終了</div>
            <div style=${{fontSize:36,fontWeight:300,color:"#d4b896",marginBottom:8}}>
              ${Math.floor(pendingSession.duration/60)}<span style=${{fontSize:16,color:"#7a6a5a"}}>分</span>
              ${Math.round(pendingSession.duration%60)>0&&html`<span style=${{fontSize:20}}>${Math.round(pendingSession.duration%60)}<span style=${{fontSize:14,color:"#7a6a5a"}}>秒</span></span>`}
            </div>
            <div style=${{fontSize:12,color:"#3a3020",marginBottom:28,letterSpacing:1}}>記録しますか？</div>
            <div style=${{display:"flex",gap:12,justifyContent:"center"}}>
              <button className="ab x" onClick=${function(){setPendingSession(null);}}>破棄</button>
              <button className="ab sv" onClick=${handlePendingSave}>保存</button>
            </div>
          </div>
        </div>
      `}
    </div>
  `;
}

preact.render(preact.h(App,null),document.getElementById("root"));
</script>
</body>
</html>
