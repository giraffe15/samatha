<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Samatha">
<meta name="theme-color" content="#09090f">
<title>Samatha</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Noto+Sans+JP:wght@300;400&subset=latin,japanese&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;user-select:none}
body{background:#09090f;color:#e8e4dc;font-family:'Inter','Noto Sans JP',sans-serif;-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{width:4px;background:#111}::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
.tab{background:none;border:none;color:#887a6a;cursor:pointer;font-family:'Inter','Noto Sans JP',sans-serif;font-size:13px;letter-spacing:3px;padding:8px 20px;transition:color .3s}
.tab.active{color:#d4b896;border-bottom:1px solid #d4b896}
.pb{background:none;border:1px solid #2a2520;color:#6b5f52;border-radius:4px;padding:6px 12px;cursor:pointer;font-family:'Inter','Noto Sans JP',sans-serif;font-size:15px;transition:all .2s}
.pb.on{border-color:#c9a87a;color:#d4b896;background:#1a1510}
.ab{border:none;border-radius:50px;cursor:pointer;font-family:'Inter','Noto Sans JP',sans-serif;letter-spacing:3px;font-size:13px;padding:13px 36px;transition:all .3s}
.s{background:#c9a87a;color:#09090f}
.x{background:transparent;border:1px solid #3a2520;color:#7a5040}
.sv{background:#4a7a5a;color:#e8e4dc}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes breathe{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:.8;transform:scale(1.04)}}
.fi{animation:fadeIn .4s ease}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/preact/dist/preact.umd.js"></script>
<script src="https://unpkg.com/preact/hooks/dist/hooks.umd.js"></script>
<script src="https://unpkg.com/htm/dist/htm.umd.js"></script>
<script>
const {useState,useEffect,useRef,useCallback}=preactHooks;
const html=htm.bind(preact.h);

const PRESETS=[15,30,45,60,90];
const MIN_RECORD_SEC=600;
const fmt=s=>`${Math.floor(s/60).toString().padStart(2,"0")}:${(Math.max(0,s)%60).toString().padStart(2,"0")}`;
const localDateStr=(d)=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
const todayStr=()=>{const d=new Date();if(d.getHours()<3)d.setDate(d.getDate()-1);return localDateStr(d);};
const getMondayStr=()=>{const d=new Date();if(d.getHours()<3)d.setDate(d.getDate()-1);const day=d.getDay();const diff=day===0?-6:1-day;d.setDate(d.getDate()+diff);return localDateStr(d);};
const getDayLabel=d=>["日","月","火","水","木","金","土"][new Date(d).getDay()];
const calcBuffer=mins=>Math.round((60/Math.sqrt(15))*Math.sqrt(mins));

function playEndBell(ctx,delayMs=0){
  if(!ctx)return;
  for(let i=0;i<5;i++)setTimeout(()=>{
    const osc=ctx.createOscillator(),gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(880,ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(660,ctx.currentTime+1.5);
    gain.gain.setValueAtTime(0.5,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+1.8);
    osc.start(ctx.currentTime);osc.stop(ctx.currentTime+2.0);
  },delayMs+i*1200);
}
function playBell(ctx,times=1){
  if(!ctx)return;
  for(let i=0;i<times;i++)setTimeout(()=>{
    const osc=ctx.createOscillator(),gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(432,ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(320,ctx.currentTime+2.0);
    gain.gain.setValueAtTime(0.35,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+2.2);
    osc.start(ctx.currentTime);osc.stop(ctx.currentTime+2.5);
  },i*800);
}

const MOUNTAIN_ROWS=44;
const MOUNTAIN_SIZE=MOUNTAIN_ROWS*(MOUNTAIN_ROWS+1)/2;
const MOUNTAIN_SLOTS=(()=>{const s=[];for(let r=0;r<MOUNTAIN_ROWS;r++){const w=MOUNTAIN_ROWS-r;for(let c=0;c<w;c++)s.push({row:r,col:c,width:w});}return s;})();
const GRAIN_COLORS=["#7dd3fc","#93c5fd","#a5f3fc","#bae6fd","#67e8f9","#38bdf8"];
const COMPLETE_COLORS=["#e8d4a8","#c9a87a","#f0e0b8","#d4b896","#e8c87a","#c9a070"];

function DustMountain({totalMinutes,totalAll}){
  const [shimmer,setShimmer]=useState(false);
  const totalGrains=Math.floor(totalMinutes/10);
  const completed=Math.floor(totalGrains/MOUNTAIN_SIZE);
  const rem=totalGrains%MOUNTAIN_SIZE;
  const CELL=6,GAP=1;
  const justCompleted=rem===0&&completed>0;
  const achieved1000=totalAll>=3600000;
  useEffect(()=>{
    if(justCompleted||achieved1000){setShimmer(true);const t=setTimeout(()=>setShimmer(false),3000);return()=>clearTimeout(t);}
  },[completed,achieved1000]);
  const gc=shimmer?COMPLETE_COLORS:GRAIN_COLORS;
  return html`
    <div style=${{background:"#0f0e0a",border:"1px solid "+(shimmer?"#5a4a2a":"#1a1610"),borderRadius:8,padding:"20px 16px",marginBottom:24,transition:"border-color 1s"}}>
      <div style=${{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:16}}>
        <div style=${{fontSize:11,letterSpacing:2,color:shimmer?"#c9a87a":"#4a3a2a",transition:"color 1s"}}>チリツモ山</div>
        <div style=${{fontSize:12,color:"#3a4a5a",letterSpacing:1}}>
          ${completed>0&&html`<span style=${{color:shimmer?"#e8d4a8":"#7dd3fc",marginRight:8}}>${completed+1}山目</span>`}
          ${totalGrains.toLocaleString()}粒 · ${Math.floor(totalMinutes/60)>0?`${Math.floor(totalMinutes/60)}時間`:""}${Math.round(totalMinutes%60)}分
        </div>
      </div>
      ${shimmer&&html`<div style=${{textAlign:"center",marginBottom:12,fontSize:12,letterSpacing:2,color:"#c9a87a",animation:"fadeIn .5s ease"}}>${achieved1000?"✦ 1000時間達成 ✦":"✦ 山ひとつ完成 ✦"}</div>`}
      <div style=${{position:"relative",height:MOUNTAIN_ROWS*(CELL+GAP),display:"flex",justifyContent:"center"}}>
        <div style=${{position:"relative",width:MOUNTAIN_ROWS*(CELL+GAP)}}>
          ${MOUNTAIN_SLOTS.map((slot,i)=>{
            const filled=justCompleted?true:i<rem;
            const x=(slot.col+(MOUNTAIN_ROWS-slot.width)/2)*(CELL+GAP);
            const y=(MOUNTAIN_ROWS-1-slot.row)*(CELL+GAP);
            const color=filled?gc[i%gc.length]:"#1a1814";
            return html`<div key=${i} style=${{position:"absolute",left:x,top:y,width:CELL,height:CELL,borderRadius:2,background:color,opacity:filled?(shimmer?1:0.85):0.4,boxShadow:filled?`0 0 ${shimmer?8:4}px ${color}${shimmer?"99":"66"}`:"none",transition:"background .8s,box-shadow .8s"}}/>`;
          })}
        </div>
      </div>
      <div style=${{marginTop:14}}>
        <div style=${{height:2,background:"#1a1814",borderRadius:1,overflow:"hidden"}}>
          <div style=${{height:"100%",width:`${justCompleted?100:(rem/MOUNTAIN_SIZE)*100}%`,background:shimmer?"linear-gradient(to right,#c9a87a,#e8d4a8)":"linear-gradient(to right,#38bdf8,#7dd3fc)",borderRadius:1,transition:"width .6s,background 1s"}}/>
        </div>
        ${!justCompleted&&html`<div style=${{fontSize:10,color:"#2a3a4a",marginTop:6,letterSpacing:1,textAlign:"right"}}>次の山まで ${MOUNTAIN_SIZE-rem}粒 (${Math.round((MOUNTAIN_SIZE-rem)*10/60)}時間${Math.round((MOUNTAIN_SIZE-rem)*10%60)}分)</div>`}
      </div>
    </div>
  `;
}

const getPhase=(e,buf,main)=>e<buf?"prep":e<buf+main?"main":"cooldown";
const getPhaseDisplay=(e,buf,main)=>{const p=getPhase(e,buf,main);return{phase:p,remaining:p==="prep"?buf-e:p==="main"?buf+main-e:buf*2+main-e};};
const PHASE_LABELS={prep:"準備",main:"瞑想",cooldown:"終了"};
const PHASE_COLORS={prep:"#7a8a9a",main:"#c9a87a",cooldown:"#8a9a7a"};

function App(){
  const [sessions,setSessions]=useState(()=>{try{const s=localStorage.getItem("samatha_sessions");return s?JSON.parse(s):[]}catch{return[]}});
  const [preset,setPreset]=useState(30);
  const [running,setRunning]=useState(false);
  const [elapsed,setElapsed]=useState(0);
  const [finished,setFinished]=useState(false);
  const [view,setView]=useState("timer");
  const [dimmed,setDimmed]=useState(false);
  const [bellTesting,setBellTesting]=useState(false);
  const [pendingSession,setPendingSession]=useState(null);
  const [dailyGoal,setDailyGoal]=useState(60);
  const [amGoal,setAmGoal]=useState(30);
  const [pmGoal,setPmGoal]=useState(30);
  const [weeklyGoal,setWeeklyGoal]=useState(null);
  const [goalDraft,setGoalDraft]=useState({dailyGoal:60,amGoal:30,pmGoal:30});
  const [confirmingGoal,setConfirmingGoal]=useState(false);
  const [showSplitInfo,setShowSplitInfo]=useState(false);

  const iRef=useRef(null),audioRef=useRef(null),wlRef=useRef(null);
  const tsRef=useRef(null),pausedRef=useRef(0),bellsRef=useRef(new Set()),runRef=useRef(false);
  const elapsedRef=useRef(0),presetRef=useRef(30);
  const sessionDateRef=useRef(todayStr()),sessionStartRef=useRef(null);
  const lpTimer=useRef(null),lpInterval=useRef(null);
  const lpTimer2=useRef(null),lpInterval2=useRef(null);
  const lpTimer3=useRef(null),lpInterval3=useRef(null);
  const lpTimer4=useRef(null),lpInterval4=useRef(null);
  const dailyGoalRef=useRef(60);

  const makeLongPress=(fn,t=lpTimer,i=lpInterval)=>({
    onTouchStart:(e)=>{
      e.preventDefault();
      if(t.current||i.current)return;
      fn();
      t.current=setTimeout(()=>{i.current=setInterval(fn,300);},600);
    },
    onTouchEnd:()=>{clearTimeout(t.current);clearInterval(i.current);t.current=null;i.current=null;},
    onTouchCancel:()=>{clearTimeout(t.current);clearInterval(i.current);t.current=null;i.current=null;},
  });

  useEffect(()=>{runRef.current=running;},[running]);
  useEffect(()=>{elapsedRef.current=elapsed;},[elapsed]);
  useEffect(()=>{presetRef.current=preset;},[preset]);
  useEffect(()=>{dailyGoalRef.current=dailyGoal;},[dailyGoal]);

  useEffect(()=>{
    try{
      const wg=localStorage.getItem("samatha_weekly_goal");
      if(wg){
        const parsed=JSON.parse(wg);
        if(parsed.weekStart===getMondayStr()){
          setWeeklyGoal(parsed);
          setDailyGoal(parsed.dailyGoal);setAmGoal(parsed.amGoal);setPmGoal(parsed.pmGoal);
          dailyGoalRef.current=parsed.dailyGoal;
        }
      }
    }catch{}
  },[]);

  const save=(arr)=>{setSessions(arr);localStorage.setItem("samatha_sessions",JSON.stringify(arr));};

  const saveWeeklyGoal=(dg,am,pm)=>{
    const wg={dailyGoal:dg,amGoal:am,pmGoal:pm,weekStart:getMondayStr()};
    setWeeklyGoal(wg);setDailyGoal(dg);setAmGoal(am);setPmGoal(pm);dailyGoalRef.current=dg;
    localStorage.setItem("samatha_weekly_goal",JSON.stringify(wg));
    try{
      const hist=JSON.parse(localStorage.getItem("samatha_weekly_history")||"[]");
      const filtered=hist.filter(h=>h.weekStart!==wg.weekStart);
      localStorage.setItem("samatha_weekly_history",JSON.stringify([...filtered,wg]));
    }catch{}
  };

  const getAchievement=(amSec,pmSec,wg)=>{
    if(!wg)return null;
    const amDone=amSec>=wg.amGoal*60,pmDone=pmSec>=wg.pmGoal*60;
    const totalDone=(amSec+pmSec)>=wg.dailyGoal*60;
    if(amDone&&pmDone)return"complete";
    if(totalDone)return"partial";
    return"none";
  };

  const getAudio=()=>{if(!audioRef.current)audioRef.current=new(window.AudioContext||window.webkitAudioContext)();return audioRef.current;};
  const acquireWL=async()=>{try{if("wakeLock"in navigator)wlRef.current=await navigator.wakeLock.request("screen");}catch{}};
  const releaseWL=()=>{try{wlRef.current?.release();}catch{}wlRef.current=null;};

  const bufSec=calcBuffer(preset),mainSec=preset*60,totalSec=bufSec*2+mainSec;

  const buildSessionMeta=(duration,presetVal)=>{
    const sd=new Date(sessionStartRef.current||Date.now());
    return{startTime:sd.toISOString(),dayOfWeek:sd.getDay(),hourOfDay:sd.getHours(),completionRate:Math.round(duration/(presetVal*60)*100),bufferSec:calcBuffer(presetVal)};
  };

  const tick=useCallback(()=>{
    if(!tsRef.current)return;
    const e=pausedRef.current+Math.floor((Date.now()-tsRef.current)/1000);
    setElapsed(e);
    const fired=bellsRef.current,ph=getPhase(e,bufSec,mainSec);
    if(ph==="main"&&!fired.has("main")){fired.add("main");playBell(audioRef.current||getAudio(),1);}
    else if(ph==="cooldown"&&!fired.has("cooldown")){fired.add("cooldown");playEndBell(audioRef.current||getAudio());}
    if(e>=totalSec){setRunning(false);setFinished(true);setDimmed(false);clearInterval(iRef.current);iRef.current=null;releaseWL();}
  },[bufSec,mainSec,totalSec]);

  useEffect(()=>{
    if(running){tsRef.current=Date.now();iRef.current=setInterval(tick,250);}
    else{clearInterval(iRef.current);iRef.current=null;}
    return()=>{clearInterval(iRef.current);iRef.current=null;};
  },[running,tick]);

  useEffect(()=>{
    const handler=async()=>{
      if(document.hidden&&runRef.current){
        setRunning(false);setDimmed(false);releaseWL();
        const mainElapsed=Math.max(0,elapsedRef.current-bufSec);
        pausedRef.current=0;tsRef.current=null;bellsRef.current=new Set();
        setElapsed(0);setFinished(false);
        if(mainElapsed>=MIN_RECORD_SEC)setPendingSession({duration:mainElapsed,preset:presetRef.current,date:sessionDateRef.current,meta:buildSessionMeta(mainElapsed,presetRef.current)});
      } else if(!document.hidden&&runRef.current){await acquireWL();}
    };
    document.addEventListener("visibilitychange",handler);
    return()=>document.removeEventListener("visibilitychange",handler);
  },[bufSec]);

  const handleStart=async()=>{
    try{getAudio().resume();}catch{}
    pausedRef.current=0;tsRef.current=null;bellsRef.current=new Set();
    sessionDateRef.current=todayStr();sessionStartRef.current=Date.now();
    setElapsed(0);setFinished(false);setDimmed(true);
    setTimeout(()=>playBell(audioRef.current||getAudio(),1),200);
    await acquireWL();setRunning(true);
  };
  const handleStop=()=>{
    setRunning(false);setDimmed(false);releaseWL();
    const mainElapsed=Math.max(0,elapsed-bufSec);
    pausedRef.current=0;tsRef.current=null;bellsRef.current=new Set();
    setElapsed(0);setFinished(false);
    if(mainElapsed>=MIN_RECORD_SEC)setPendingSession({duration:mainElapsed,preset,date:sessionDateRef.current,meta:buildSessionMeta(mainElapsed,preset)});
  };
  const handleSave=()=>{
    const meta=buildSessionMeta(mainSec,preset);
    pausedRef.current=0;tsRef.current=null;bellsRef.current=new Set();
    setElapsed(0);setFinished(false);
    save([{id:Date.now(),date:sessionDateRef.current,duration:mainSec,preset,...meta},...sessions]);
  };
  const handlePendingSave=()=>{
    if(!pendingSession)return;
    const entry={id:Date.now(),date:pendingSession.date||sessionDateRef.current,duration:pendingSession.duration,preset:pendingSession.preset,...(pendingSession.meta||buildSessionMeta(pendingSession.duration,pendingSession.preset))};
    save([entry,...sessions]);setPendingSession(null);
  };
  const handleDeleteSession=(id)=>{save(sessions.filter(s=>s.id!==id));};

  const {phase,remaining}=getPhaseDisplay(elapsed,bufSec,mainSec);
  const phaseColor=PHASE_COLORS[phase]||"#c9a87a";
  const pp=phase==="prep"?elapsed/bufSec:phase==="main"?(elapsed-bufSec)/mainSec:(elapsed-bufSec-mainSec)/bufSec;
  const R=110,C=2*Math.PI*R,dO=C*(1-Math.min(pp,1));

  const byDate=sessions.reduce((a,s)=>{a[s.date]=(a[s.date]||0)+s.duration;return a;},{});
  const last14=Array.from({length:14},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(13-i));return localDateStr(d);});
  const todayTotal=byDate[todayStr()]||0;
  const weekTotal=last14.slice(7).reduce((a,d)=>a+(byDate[d]||0),0);
  const weekDaysElapsed=(()=>{const mon=new Date(getMondayStr());const today=new Date(todayStr());return Math.min(7,Math.round((today-mon)/(1000*60*60*24))+1);})();
  const totalAll=sessions.reduce((a,s)=>a+s.duration,0);
  const monthTotal=(()=>{const d=new Date();if(d.getHours()<3)d.setDate(d.getDate()-1);const prefix=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;return Object.entries(byDate).filter(([k])=>k.startsWith(prefix)).reduce((a,[,v])=>a+v,0);})();
  const isAM=(s)=>{const h=new Date(s.startTime||0).getHours();return h>=3&&h<12;};
  const todaySessions=sessions.filter(s=>s.date===todayStr());
  const amTotal=todaySessions.filter(s=>s.startTime&&isAM(s)).reduce((a,s)=>a+s.duration,0);
  const pmTotal=todaySessions.filter(s=>s.startTime&&!isAM(s)).reduce((a,s)=>a+s.duration,0);
  const todayAchievement=getAchievement(amTotal,pmTotal,weeklyGoal);
  const thisWeekDays=(()=>{const monday=getMondayStr();const days=[];const cur=new Date(monday);const today=new Date(todayStr());while(cur<=today){days.push(localDateStr(cur));cur.setDate(cur.getDate()+1);}return days;})();
  const weekAchievements=weeklyGoal?thisWeekDays.map(date=>{const ds=sessions.filter(s=>s.date===date);const da=ds.filter(s=>s.startTime&&isAM(s)).reduce((a,s)=>a+s.duration,0);const dp=ds.filter(s=>s.startTime&&!isAM(s)).reduce((a,s)=>a+s.duration,0);return getAchievement(da,dp,weeklyGoal);}):[]; 
  const weekComplete=weekAchievements.filter(a=>a==="complete").length;
  const weekPartial=weekAchievements.filter(a=>a==="partial").length;
  const streak=(()=>{let s=0,d=new Date();if(d.getHours()<3)d.setDate(d.getDate()-1);while(byDate[localDateStr(d)]){s++;d.setDate(d.getDate()-1);}return s;})();
  const bestStreak=(()=>{const dates=Object.keys(byDate).sort();let best=0,cur=0,prev=null;for(const dt of dates){if(prev){const p=new Date(prev);p.setDate(p.getDate()+1);cur=localDateStr(p)===dt?cur+1:1;}else{cur=1;}best=Math.max(best,cur);prev=dt;}return best;})();
  const last14Avg=Math.round(last14.reduce((a,d)=>a+(byDate[d]||0),0)/60/14);
  const weekAvg=Math.round(weekTotal/60/weekDaysElapsed);
  const monthAvg=(()=>{const d=new Date();if(d.getHours()<3)d.setDate(d.getDate()-1);return Math.round(monthTotal/60/d.getDate());})();
  const avgAll=(()=>{if(sessions.length===0)return 0;const first=Object.keys(byDate).sort()[0];const d1=new Date(first),d2=new Date(todayStr());const days=Math.max(1,Math.round((d2-d1)/(1000*60*60*24))+1);return Math.round(totalAll/60/days);})();
  const heatColor=m=>m===0?"#1a1814":m<10?"#2d3822":m<20?"#4a6030":m<30?"#7a8f40":"#c9a87a";
  const MONTHS=["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
  const heatWeeks=(()=>{
    const end=new Date();
    const firstDate=Object.keys(byDate).sort()[0];
    const start=firstDate?new Date(firstDate):new Date();
    // 最大364日、最小は今日
    const maxStart=new Date();maxStart.setDate(end.getDate()-364);
    if(start<maxStart)start.setTime(maxStart.getTime());
    const ps=new Date(start);ps.setDate(start.getDate()-start.getDay());
    const weeks=[],cur=new Date(ps);
    while(cur<=end){const w=[];for(let d=0;d<7;d++){const ds=localDateStr(cur);w.push({date:ds,mins:Math.round((byDate[ds]||0)/60),inRange:cur>=start&&cur<=end});cur.setDate(cur.getDate()+1);}weeks.push(w);}
    return weeks;
  })();

  return html`
    <div style=${{minHeight:"100vh",background:"#09090f",color:"#e8e4dc",fontFamily:"'Inter','Noto Sans JP',sans-serif",display:"flex",flexDirection:"column",alignItems:"center",WebkitUserSelect:"none",userSelect:"none"}}>

      ${dimmed&&html`
        <div style=${{position:"fixed",top:0,left:0,right:0,bottom:0,background:"#09090f",zIndex:9999,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:24}}>
          <div style=${{fontSize:12,letterSpacing:4,color:phaseColor,opacity:.7}}>${PHASE_LABELS[phase]}</div>
          <div style=${{position:"relative",width:240,height:240}}>
            <svg width="240" height="240" style=${{position:"absolute"}}>
              <circle cx="120" cy="120" r="108" fill="none" stroke="#1a1814" strokeWidth="2"/>
              <circle cx="120" cy="120" r="108" fill="none" stroke=${phaseColor} strokeWidth="1.5"
                strokeDasharray=${2*Math.PI*108} strokeDashoffset=${2*Math.PI*108*(1-Math.min(pp,1))}
                strokeLinecap="round" transform="rotate(-90 120 120)"
                style=${{transition:"stroke-dashoffset .5s ease,stroke .8s ease",filter:`drop-shadow(0 0 5px ${phaseColor}66)`}}/>
            </svg>
            <div style=${{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:6}}>
              <div style=${{fontWeight:300,fontSize:52,color:phaseColor,letterSpacing:2,fontVariantNumeric:"tabular-nums",transition:"color .8s"}}>${fmt(remaining)}</div>
              <div style=${{width:20,height:1,background:phaseColor,opacity:.4,animation:"breathe 4s ease-in-out infinite"}}/>
            </div>
          </div>
          <button className="ab x" onClick=${handleStop}>終了</button>

                <label style=${{background:"none",border:"1px solid #2a2520",color:"#5a4a3a",borderRadius:4,padding:"7px 16px",cursor:"pointer",fontSize:13,letterSpacing:1}}>
                  ↑ インポート
                  <input type="file" accept=".json" style=${{display:"none"}} onChange=${(e)=>{const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=(ev)=>{try{const imported=JSON.parse(ev.target.result);if(Array.isArray(imported)){save(imported);alert(`${imported.length}件インポートしました`);}}catch{alert("読み込みに失敗しました");}};reader.readAsText(file);e.target.value="";}}/>
                </label>
                <button onClick=${()=>{if(bellTesting)return;setBellTesting(true);try{getAudio().resume();}catch{}playEndBell(audioRef.current||getAudio(),3000);setTimeout(()=>setBellTesting(false),3000+5*1200+500);}} style=${{background:"none",border:"1px solid #2a2520",color:bellTesting?"#2a2520":"#5a4a3a",borderRadius:4,padding:"7px 16px",cursor:bellTesting?"not-allowed":"pointer",fontSize:13,letterSpacing:1}}>🔔 ${bellTesting?"確認中...":"アラーム確認"}</button>
              </div>
            </div>
          </div>
        `}
      </div>

      ${showSplitInfo&&html`
        <div style=${{position:"fixed",inset:0,background:"rgba(0,0,0,.8)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:24}} onClick=${()=>setShowSplitInfo(false)}>
          <div style=${{background:"#0f0e0a",border:"1px solid #2a2520",borderRadius:12,padding:"28px 24px",width:"100%",maxWidth:320}} onClick=${e=>e.stopPropagation()}>
            <div style=${{fontSize:11,letterSpacing:3,color:"#5a4a3a",marginBottom:20}}>時間帯の定義</div>
            <div style=${{display:"flex",flexDirection:"column",gap:12,marginBottom:24}}>
              <div style=${{background:"#0d0c09",border:"1px solid #1e1a16",borderRadius:6,padding:"10px 14px"}}>
                <div style=${{fontSize:9,letterSpacing:2,color:"#3a3020",marginBottom:4}}>1日の区切り</div>
                <div style=${{fontSize:13,color:"#a89070"}}>午前3時 〜 翌午前2時59分</div>
                <div style=${{fontSize:10,color:"#3a3020",marginTop:3}}>深夜2時まで「今日」として扱います</div>
              </div>
              <div style=${{background:"#0d0c09",border:"1px solid #1e1a16",borderRadius:6,padding:"10px 14px"}}>
                <div style=${{fontSize:9,letterSpacing:2,color:"#3a3020",marginBottom:4}}>前半</div>
                <div style=${{fontSize:13,color:"#a89070"}}>午前3時 〜 午前11時59分</div>
                <div style=${{fontSize:10,color:"#3a3020",marginTop:3}}>朝の瞑想</div>
              </div>
              <div style=${{background:"#0d0c09",border:"1px solid #1e1a16",borderRadius:6,padding:"10px 14px"}}>
                <div style=${{fontSize:9,letterSpacing:2,color:"#3a3020",marginBottom:4}}>後半</div>
                <div style=${{fontSize:13,color:"#a89070"}}>正午 〜 翌午前2時59分</div>
                <div style=${{fontSize:10,color:"#3a3020",marginTop:3}}>昼・夜の瞑想</div>
              </div>
            </div>
            <div style=${{display:"flex",justifyContent:"center"}}>
              <button className="ab x" onClick=${()=>setShowSplitInfo(false)}>閉じる</button>
            </div>
          </div>
        </div>
      `}

      ${confirmingGoal&&html`
        <div style=${{position:"fixed",inset:0,background:"rgba(0,0,0,.8)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div style=${{background:"#0f0e0a",border:"1px solid #2a2520",borderRadius:12,padding:"32px 24px",width:"100%",maxWidth:320,textAlign:"center"}}>
            <div style=${{fontSize:11,letterSpacing:3,color:"#5a4a3a",marginBottom:20}}>今週の目標</div>
            <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:20}}>
              ${[{l:"1日",v:dailyGoal},{l:"前半",v:amGoal},{l:"後半",v:pmGoal}].map(({l,v})=>html`
                <div key=${l} style=${{background:"#0d0c09",border:"1px solid #1e1a16",borderRadius:6,padding:"10px 6px",textAlign:"center"}}>
                  <div style=${{fontSize:9,letterSpacing:2,color:"#3a3020",marginBottom:4}}>${l}</div>
                  <div style=${{fontSize:22,fontWeight:300,color:"#c9a87a"}}>${v}<span style=${{fontSize:10,color:"#5a4a3a"}}>分</span></div>
                </div>
              `)}
            </div>
            <div style=${{fontSize:11,color:"#3a3020",marginBottom:24,letterSpacing:1}}>この内容で今週の目標を確定しますか？<br/>確定後は翌月曜まで変更できません。</div>
            <div style=${{display:"flex",gap:12,justifyContent:"center"}}>
              <button className="ab sv" onClick=${()=>{saveWeeklyGoal(dailyGoal,amGoal,pmGoal);setConfirmingGoal(false);}}>確定</button>
              <button className="ab x" onClick=${()=>setConfirmingGoal(false)}>戻る</button>
            </div>
          </div>
        </div>
      `}

      ${pendingSession&&html`
        <div style=${{position:"fixed",inset:0,background:"rgba(0,0,0,.7)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div style=${{background:"#0f0e0a",border:"1px solid #2a2520",borderRadius:12,padding:"32px 24px",width:"100%",maxWidth:320,textAlign:"center"}}>
            <div style=${{fontSize:11,letterSpacing:3,color:"#5a4a3a",marginBottom:16}}>セッション終了</div>
            <div style=${{fontSize:36,fontWeight:300,color:"#d4b896",marginBottom:8}}>
              ${Math.floor(pendingSession.duration/60)}<span style=${{fontSize:16,color:"#7a6a5a"}}>分</span>
              ${Math.round(pendingSession.duration%60)>0&&html`<span style=${{fontSize:20}}>${Math.round(pendingSession.duration%60)}<span style=${{fontSize:14,color:"#7a6a5a"}}>秒</span></span>`}
            </div>
            <div style=${{fontSize:12,color:"#3a3020",marginBottom:28,letterSpacing:1}}>記録しますか？</div>
            <div style=${{display:"flex",gap:12,justifyContent:"center"}}>
              <button className="ab sv" onClick=${handlePendingSave}>保存</button>
              <button className="ab x" onClick=${()=>setPendingSession(null)}>破棄</button>
            </div>
          </div>
        </div>
      `}
    </div>
  `;
}

preact.render(html`<${App}/>`,document.getElementById("root"));
</script>
</body>
</html>
