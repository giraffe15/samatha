<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Samatha">
<meta name="theme-color" content="#09090f">
<title>Samatha 瞑想タイマー</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Cormorant+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#09090f;color:#e8e4dc;font-family:'Cormorant Garamond',Georgia,serif;-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{width:4px;background:#111}::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
.tab{background:none;border:none;color:#887a6a;cursor:pointer;font-family:'Cormorant SC',serif;font-size:13px;letter-spacing:3px;padding:8px 20px;transition:color .3s}
.tab.active{color:#d4b896;border-bottom:1px solid #d4b896}
.pb{background:none;border:1px solid #2a2520;color:#6b5f52;border-radius:4px;padding:6px 12px;cursor:pointer;font-family:'Cormorant Garamond',serif;font-size:15px;transition:all .2s}
.pb.on{border-color:#c9a87a;color:#d4b896;background:#1a1510}
.ab{border:none;border-radius:50px;cursor:pointer;font-family:'Cormorant SC',serif;letter-spacing:3px;font-size:13px;padding:13px 36px;transition:all .3s}
.s{background:#c9a87a;color:#09090f}
.x{background:transparent;border:1px solid #3a2520;color:#7a5040}
.sv{background:#4a7a5a;color:#e8e4dc}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes breathe{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:.8;transform:scale(1.04)}}
.fi{animation:fadeIn .4s ease}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

const PRESETS=[15,30,45,60,90];
const MIN_RECORD_SEC=600;
const fmt=s=>`${Math.floor(s/60).toString().padStart(2,"0")}:${(Math.max(0,s)%60).toString().padStart(2,"0")}`;
const todayStr=()=>{const d=new Date();if(d.getHours()<3)d.setDate(d.getDate()-1);return d.toISOString().slice(0,10);};
const getDayLabel=d=>["日","月","火","水","木","金","土"][new Date(d).getDay()];
const calcBuffer=mins=>Math.round((60/Math.sqrt(15))*Math.sqrt(mins));

function playEndBell(ctx,delayMs=0){
  if(!ctx)return;
  for(let i=0;i<5;i++)setTimeout(()=>{
    const osc=ctx.createOscillator(),gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(880,ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(660,ctx.currentTime+1.5);
    gain.gain.setValueAtTime(0.5,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+1.8);
    osc.start(ctx.currentTime);osc.stop(ctx.currentTime+2.0);
  },delayMs+i*1200);
}

function playBell(ctx,times=1,interval=800){
  if(!ctx)return;
  for(let i=0;i<times;i++)setTimeout(()=>{
    const osc=ctx.createOscillator(),gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(432,ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(320,ctx.currentTime+2.0);
    gain.gain.setValueAtTime(0.35,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+2.2);
    osc.start(ctx.currentTime);osc.stop(ctx.currentTime+2.5);
  },i*interval);
}

const MOUNTAIN_ROWS=44;
const MOUNTAIN_SIZE=MOUNTAIN_ROWS*(MOUNTAIN_ROWS+1)/2;
const MOUNTAIN_SLOTS=(()=>{const s=[];for(let r=0;r<MOUNTAIN_ROWS;r++){const w=MOUNTAIN_ROWS-r;for(let c=0;c<w;c++)s.push({row:r,col:c,width:w});}return s;})();
const GRAIN_COLORS=["#7dd3fc","#93c5fd","#a5f3fc","#bae6fd","#67e8f9","#38bdf8"];
const COMPLETE_COLORS=["#e8d4a8","#c9a87a","#f0e0b8","#d4b896","#e8c87a","#c9a070"];

function DustMountain({totalMinutes,totalAll}){
  const [shimmer,setShimmer]=useState(false);
  const totalGrains=Math.floor(totalMinutes/10);
  const completed=Math.floor(totalGrains/MOUNTAIN_SIZE);
  const rem=totalGrains%MOUNTAIN_SIZE;
  const CELL=6,GAP=1;
  const justCompleted=rem===0&&completed>0;
  const achieved1000=totalAll>=3600000;

  useEffect(()=>{
    if(justCompleted||achieved1000){
      setShimmer(true);
      const t=setTimeout(()=>setShimmer(false),3000);
      return()=>clearTimeout(t);
    }
  },[completed,achieved1000]);

  const gc=shimmer?COMPLETE_COLORS:GRAIN_COLORS;
  return(
    <div style={{background:"#0f0e0a",border:"1px solid "+(shimmer?"#5a4a2a":"#1a1610"),borderRadius:8,padding:"20px 16px",marginBottom:24,transition:"border-color 1s"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:16}}>
        <div style={{fontSize:11,letterSpacing:3,color:shimmer?"#c9a87a":"#4a3a2a",fontFamily:"'Cormorant SC',serif",transition:"color 1s"}}>チリツモ山</div>
        <div style={{fontSize:12,color:"#3a4a5a",letterSpacing:1}}>
          {completed>0&&<span style={{color:shimmer?"#e8d4a8":"#7dd3fc",marginRight:8,transition:"color 1s"}}>{completed+1}山目</span>}
          {totalGrains.toLocaleString()}粒 · {Math.floor(totalMinutes/60)>0?`${Math.floor(totalMinutes/60)}時間`:""}{Math.round(totalMinutes%60)}分
        </div>
      </div>
      {shimmer&&<div style={{textAlign:"center",marginBottom:12,fontSize:12,letterSpacing:2,color:"#c9a87a",animation:"fadeIn .5s ease",fontFamily:"'Cormorant SC',serif"}}>{achieved1000?"✦ 1000時間達成 ✦":"✦ 山ひとつ完成 ✦"}</div>}
      <div style={{position:"relative",height:MOUNTAIN_ROWS*(CELL+GAP),display:"flex",justifyContent:"center"}}>
        <div style={{position:"relative",width:MOUNTAIN_ROWS*(CELL+GAP)}}>
          {MOUNTAIN_SLOTS.map((slot,i)=>{
            const filled=justCompleted?true:i<rem;
            const x=(slot.col+(MOUNTAIN_ROWS-slot.width)/2)*(CELL+GAP);
            const y=(MOUNTAIN_ROWS-1-slot.row)*(CELL+GAP);
            const color=filled?gc[i%gc.length]:"#1a1814";
            return<div key={i} style={{position:"absolute",left:x,top:y,width:CELL,height:CELL,borderRadius:2,background:color,opacity:filled?(shimmer?1:0.85):0.4,boxShadow:filled?`0 0 ${shimmer?8:4}px ${color}${shimmer?"99":"66"}`:"none",transition:"background .8s,box-shadow .8s"}}/>;
          })}
        </div>
      </div>
      <div style={{marginTop:14}}>
        <div style={{height:2,background:"#1a1814",borderRadius:1,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${justCompleted?100:(rem/MOUNTAIN_SIZE)*100}%`,background:shimmer?"linear-gradient(to right,#c9a87a,#e8d4a8)":"linear-gradient(to right,#38bdf8,#7dd3fc)",borderRadius:1,transition:"width .6s,background 1s"}}/>
        </div>
        {!justCompleted&&<div style={{fontSize:10,color:"#2a3a4a",marginTop:6,letterSpacing:1,textAlign:"right"}}>次の山まで {MOUNTAIN_SIZE-rem}粒 ({Math.round((MOUNTAIN_SIZE-rem)*10/60)}時間{Math.round((MOUNTAIN_SIZE-rem)*10%60)}分)</div>}
      </div>
    </div>
  );
}

const getPhase=(e,buf,main)=>e<buf?"prep":e<buf+main?"main":"cooldown";
const getPhaseDisplay=(e,buf,main)=>{const p=getPhase(e,buf,main);return{phase:p,remaining:p==="prep"?buf-e:p==="main"?buf+main-e:buf*2+main-e};};
const PHASE_LABELS={prep:"準備",main:"瞑想",cooldown:"終了"};
const PHASE_COLORS={prep:"#7a8a9a",main:"#c9a87a",cooldown:"#8a9a7a"};

function App(){
  const [sessions,setSessions]=useState(()=>{try{const s=localStorage.getItem("samatha_sessions");return s?JSON.parse(s):[]}catch{return[]}});
  const [preset,setPreset]=useState(30);
  const [running,setRunning]=useState(false);
  const [elapsed,setElapsed]=useState(0);
  const [finished,setFinished]=useState(false);
  const [view,setView]=useState("timer");
  const [dimmed,setDimmed]=useState(false);
  const [bellTesting,setBellTesting]=useState(false);
  const [pendingSession,setPendingSession]=useState(null);
  const [dailyGoal,setDailyGoal]=useState(()=>{try{return parseInt(localStorage.getItem("samatha_daily_goal")||"60");}catch{return 60;}});

  const iRef=useRef(null),audioRef=useRef(null),wlRef=useRef(null);
  const tsRef=useRef(null),pausedRef=useRef(0),bellsRef=useRef(new Set()),runRef=useRef(false);
  const elapsedRef=useRef(0),presetRef=useRef(30);
  const sessionDateRef=useRef(todayStr()),sessionStartRef=useRef(null);

  useEffect(()=>{runRef.current=running;},[running]);
  useEffect(()=>{elapsedRef.current=elapsed;},[elapsed]);
  useEffect(()=>{presetRef.current=preset;},[preset]);

  const save=(arr)=>{setSessions(arr);localStorage.setItem("samatha_sessions",JSON.stringify(arr));};
  const saveDailyGoal=(v)=>{setDailyGoal(v);localStorage.setItem("samatha_daily_goal",String(v));};
  const getAudio=()=>{if(!audioRef.current)audioRef.current=new(window.AudioContext||window.webkitAudioContext)();return audioRef.current;};
  const acquireWL=async()=>{try{if("wakeLock"in navigator)wlRef.current=await navigator.wakeLock.request("screen");}catch{}};
  const releaseWL=()=>{try{wlRef.current?.release();}catch{}wlRef.current=null;};

  const bufSec=calcBuffer(preset),mainSec=preset*60,totalSec=bufSec*2+mainSec;

  const buildSessionMeta=(duration,presetVal)=>{
    const startTs=sessionStartRef.current||Date.now();
    const sd=new Date(startTs);
    return{startTime:sd.toISOString(),dayOfWeek:sd.getDay(),hourOfDay:sd.getHours(),completionRate:Math.round(duration/(presetVal*60)*100),bufferSec:calcBuffer(presetVal)};
  };

  const tick=useCallback(()=>{
    if(!tsRef.current)return;
    const e=pausedRef.current+Math.floor((Date.now()-tsRef.current)/1000);
    setElapsed(e);
    const fired=bellsRef.current,ph=getPhase(e,bufSec,mainSec);
    if(ph==="main"&&!fired.has("main")){fired.add("main");playBell(audioRef.current||getAudio(),1);}
    else if(ph==="cooldown"&&!fired.has("cooldown")){fired.add("cooldown");playEndBell(audioRef.current||getAudio());}
    if(e>=totalSec){setRunning(false);setFinished(true);setDimmed(false);clearInterval(iRef.current);iRef.current=null;releaseWL();}
  },[bufSec,mainSec,totalSec]);

  useEffect(()=>{
    if(running){tsRef.current=Date.now();iRef.current=setInterval(tick,250);}
    else{clearInterval(iRef.current);iRef.current=null;}
    return()=>{clearInterval(iRef.current);iRef.current=null;};
  },[running,tick]);

  useEffect(()=>{
    const handler=async()=>{
      if(document.hidden&&runRef.current){
        setRunning(false);setDimmed(false);releaseWL();
        const mainElapsed=Math.max(0,elapsedRef.current-bufSec);
        pausedRef.current=0;tsRef.current=null;bellsRef.current=new Set();
        setElapsed(0);setFinished(false);
        if(mainElapsed>=MIN_RECORD_SEC)setPendingSession({duration:mainElapsed,preset:presetRef.current,date:sessionDateRef.current,meta:buildSessionMeta(mainElapsed,presetRef.current)});
      } else if(!document.hidden&&runRef.current){await acquireWL();}
    };
    document.addEventListener("visibilitychange",handler);
    return()=>document.removeEventListener("visibilitychange",handler);
  },[bufSec]);

  const handleStart=async()=>{
    try{getAudio().resume();}catch{}
    pausedRef.current=0;tsRef.current=null;bellsRef.current=new Set();
    sessionDateRef.current=todayStr();sessionStartRef.current=Date.now();
    setElapsed(0);setFinished(false);setDimmed(true);
    setTimeout(()=>playBell(audioRef.current||getAudio(),1),200);
    await acquireWL();setRunning(true);
  };

  const handleStop=()=>{
    setRunning(false);setDimmed(false);releaseWL();
    const mainElapsed=Math.max(0,elapsed-bufSec);
    pausedRef.current=0;tsRef.current=null;bellsRef.current=new Set();
    setElapsed(0);setFinished(false);
    if(mainElapsed>=MIN_RECORD_SEC)setPendingSession({duration:mainElapsed,preset,date:sessionDateRef.current,meta:buildSessionMeta(mainElapsed,preset)});
  };

  const handleSave=()=>{
    const meta=buildSessionMeta(mainSec,preset);
    pausedRef.current=0;tsRef.current=null;bellsRef.current=new Set();
    setElapsed(0);setFinished(false);
    save([{id:Date.now(),date:sessionDateRef.current,duration:mainSec,preset,...meta},...sessions]);
  };

  const handlePendingSave=()=>{
    if(!pendingSession)return;
    const entry={id:Date.now(),date:pendingSession.date||sessionDateRef.current,duration:pendingSession.duration,preset:pendingSession.preset,...(pendingSession.meta||buildSessionMeta(pendingSession.duration,pendingSession.preset))};
    save([entry,...sessions]);setPendingSession(null);
  };

  const handleDeleteSession=(id)=>{save(sessions.filter(s=>s.id!==id));};

  const {phase,remaining}=getPhaseDisplay(elapsed,bufSec,mainSec);
  const phaseColor=PHASE_COLORS[phase]||"#c9a87a";
  const pp=phase==="prep"?elapsed/bufSec:phase==="main"?(elapsed-bufSec)/mainSec:(elapsed-bufSec-mainSec)/bufSec;
  const R=110,C=2*Math.PI*R,dO=C*(1-Math.min(pp,1));

  const byDate=sessions.reduce((a,s)=>{a[s.date]=(a[s.date]||0)+s.duration;return a;},{});
  const last14=Array.from({length:14},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(13-i));return d.toISOString().slice(0,10);});
  const maxV=Math.max(...last14.map(d=>byDate[d]||0),1);
  const todayTotal=byDate[todayStr()]||0;
  const weekTotal=last14.slice(7).reduce((a,d)=>a+(byDate[d]||0),0);
  const totalAll=sessions.reduce((a,s)=>a+s.duration,0);
  const monthTotal=(()=>{const d=new Date();if(d.getHours()<3)d.setDate(d.getDate()-1);const prefix=d.toISOString().slice(0,7);return Object.entries(byDate).filter(([k])=>k.startsWith(prefix)).reduce((a,[,v])=>a+v,0);})();
  const streak=(()=>{let s=0,d=new Date();if(d.getHours()<3)d.setDate(d.getDate()-1);while(byDate[d.toISOString().slice(0,10)]){s++;d.setDate(d.getDate()-1);}return s;})();
  const bestStreak=(()=>{const dates=Object.keys(byDate).sort();let best=0,cur=0,prev=null;for(const dt of dates){if(prev){const p=new Date(prev);p.setDate(p.getDate()+1);cur=p.toISOString().slice(0,10)===dt?cur+1:1;}else{cur=1;}best=Math.max(best,cur);prev=dt;}return best;})();
  const heatColor=m=>m===0?"#1a1814":m<10?"#2d3822":m<20?"#4a6030":m<30?"#7a8f40":"#c9a87a";
  const MONTHS=["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
  const heatWeeks=(()=>{const end=new Date(),start=new Date();start.setDate(end.getDate()-364);const ps=new Date(start);ps.setDate(start.getDate()-start.getDay());const weeks=[],cur=new Date(ps);while(cur<=end){const w=[];for(let d=0;d<7;d++){const ds=cur.toISOString().slice(0,10);w.push({date:ds,mins:Math.round((byDate[ds]||0)/60),inRange:cur>=start&&cur<=end});cur.setDate(cur.getDate()+1);}weeks.push(w);}return weeks;})();

  return(
    <div style={{minHeight:"100vh",background:"#09090f",color:"#e8e4dc",fontFamily:"'Cormorant Garamond',Georgia,serif",display:"flex",flexDirection:"column",alignItems:"center"}}>

      {dimmed&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.88)",zIndex:100,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:24}}>
          <div style={{fontFamily:"'Cormorant SC',serif",fontSize:12,letterSpacing:4,color:phaseColor,opacity:.7}}>{PHASE_LABELS[phase]}</div>
          <div style={{position:"relative",width:240,height:240}}>
            <svg width="240" height="240" style={{position:"absolute"}}>
              <circle cx="120" cy="120" r="108" fill="none" stroke="#1a1814" strokeWidth="2"/>
              <circle cx="120" cy="120" r="108" fill="none" stroke={phaseColor} strokeWidth="1.5"
                strokeDasharray={2*Math.PI*108} strokeDashoffset={2*Math.PI*108*(1-Math.min(pp,1))}
                strokeLinecap="round" transform="rotate(-90 120 120)"
                style={{transition:"stroke-dashoffset .5s ease,stroke .8s ease",filter:`drop-shadow(0 0 5px ${phaseColor}66)`}}/>
            </svg>
            <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:6}}>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontWeight:300,fontSize:52,color:phaseColor,letterSpacing:2,fontVariantNumeric:"tabular-nums",transition:"color .8s"}}>{fmt(remaining)}</div>
              <div style={{width:20,height:1,background:phaseColor,opacity:.4,animation:"breathe 4s ease-in-out infinite"}}/>
            </div>
          </div>
          <button className="ab x" onClick={handleStop}>終了</button>
          <div style={{fontSize:10,letterSpacing:2,color:"#2a2018",fontFamily:"'Cormorant SC',serif"}}>10分未満は記録されません</div>
        </div>
      )}

      <div style={{width:"100%",maxWidth:480,padding:"28px 24px 0"}}>
        <div style={{textAlign:"center",marginBottom:4}}>
          <div style={{fontFamily:"'Cormorant SC',serif",fontSize:11,letterSpacing:6,color:"#5a4a3a",marginBottom:6}}>SAMATHA</div>
          <h1 style={{fontFamily:"'Cormorant Garamond',serif",fontWeight:300,fontSize:28,color:"#d4b896",letterSpacing:2}}>瞑想タイマー</h1>
        </div>
        <div style={{display:"flex",justifyContent:"center",gap:8,marginTop:20,borderBottom:"1px solid #1e1a16",paddingBottom:2}}>
          <button className={`tab ${view==="timer"?"active":""}`} onClick={()=>setView("timer")}>TIMER</button>
          <button className={`tab ${view==="stats"?"active":""}`} onClick={()=>setView("stats")}>RECORD</button>
        </div>
      </div>

      <div style={{width:"100%",maxWidth:480,padding:"24px 24px 60px",flex:1}}>
        {view==="timer"?(
          <div className="fi">
            <div style={{display:"flex",flexWrap:"wrap",gap:8,justifyContent:"center",marginBottom:16}}>
              {PRESETS.map(p=><button key={p} className={`pb ${preset===p?"on":""}`} onClick={()=>{if(!running){setPreset(p);setElapsed(0);setFinished(false);}}}>{p}分</button>)}
            </div>
            <div style={{textAlign:"center",marginBottom:28,fontSize:12,color:"#3a3020",letterSpacing:1}}>
              準備 {fmt(calcBuffer(preset))} · 本番 {preset}分 · 終了 {fmt(calcBuffer(preset))}
            </div>
            <div style={{display:"flex",justifyContent:"center",marginBottom:36}}>
              <div style={{position:"relative",width:260,height:260}}>
                <svg width="260" height="260" style={{position:"absolute"}}>
                  <circle cx="130" cy="130" r={R} fill="none" stroke="#1e1a16" strokeWidth="3"/>
                  {!finished&&<circle cx="130" cy="130" r={R} fill="none" stroke={elapsed>0?phaseColor:"#3a3020"} strokeWidth="2.5"
                    strokeDasharray={C} strokeDashoffset={dO} strokeLinecap="round" transform="rotate(-90 130 130)"
                    style={{transition:"stroke-dashoffset .5s ease,stroke .8s ease",filter:`drop-shadow(0 0 6px ${phaseColor}55)`}}/>}
                  {[0,90,180,270].map(a=>{const r=(a-90)*Math.PI/180;return<circle key={a} cx={130+(R+12)*Math.cos(r)} cy={130+(R+12)*Math.sin(r)} r="2" fill="#2a2520"/>;} )}
                </svg>
                <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4}}>
                  {finished?(
                    <div style={{textAlign:"center",animation:"fadeIn .5s ease"}}>
                      <div style={{fontSize:32,marginBottom:4}}>✦</div>
                      <div style={{fontFamily:"'Cormorant SC',serif",fontSize:13,letterSpacing:3,color:"#c9a87a"}}>完了</div>
                    </div>
                  ):elapsed>0?(
                    <>
                      <div style={{fontFamily:"'Cormorant SC',serif",fontSize:10,letterSpacing:3,color:phaseColor,opacity:.7}}>{PHASE_LABELS[phase]}</div>
                      <div style={{fontFamily:"'Cormorant Garamond',serif",fontWeight:300,fontSize:50,color:phaseColor,letterSpacing:2,fontVariantNumeric:"tabular-nums"}}>{fmt(remaining)}</div>
                    </>
                  ):(
                    <div style={{fontFamily:"'Cormorant Garamond',serif",fontWeight:300,fontSize:50,color:"#3a3020",letterSpacing:2}}>{fmt(totalSec)}</div>
                  )}
                </div>
              </div>
            </div>
            <div style={{display:"flex",justifyContent:"center",gap:12}}>
              {finished?(<><button className="ab sv" onClick={handleSave}>記録する</button><button className="ab x" onClick={()=>{setFinished(false);setElapsed(0);}}>破棄</button></>):(<button className="ab s" onClick={handleStart}>開始</button>)}
            </div>
            <div style={{textAlign:"center",marginTop:32,color:"#3a3020",fontSize:12,letterSpacing:1}}>
              {todayTotal>0?(<><span style={{color:"#5a4a3a"}}>今日</span>{" "}<span style={{color:"#c9a87a",fontFamily:"'Cormorant Garamond',serif",fontSize:16}}>{Math.round(todayTotal/60)}</span><span style={{color:"#5a4a3a"}}>分</span>{dailyGoal>0&&<span style={{color:"#3a3020"}}> / {dailyGoal}分</span>}</>):dailyGoal>0?(<span style={{color:"#2a2018"}}>今日の目標 {dailyGoal}分</span>):null}
            </div>
          </div>
        ):(
          <div className="fi">
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:1,marginBottom:1,border:"1px solid #1e1a16",borderRadius:"6px 6px 0 0",overflow:"hidden"}}>
              {[{l:"今日",v:Math.round(todayTotal/60),u:"分"},{l:"今週",v:Math.round(weekTotal/60),u:"分"},{l:"今月",v:Math.round(monthTotal/60),u:"分"}].map(({l,v,u},i)=>(
                <div key={l} style={{background:"#0f0e0a",padding:"12px 6px",textAlign:"center",borderRight:i<2?"1px solid #1e1a16":"none"}}>
                  <div style={{fontSize:9,letterSpacing:2,color:"#3a3020",marginBottom:4,fontFamily:"'Cormorant SC',serif"}}>{l}</div>
                  <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:24,fontWeight:300,color:"#c9a87a",lineHeight:1}}>{v}</div>
                  <div style={{fontSize:9,color:"#3a3020",marginTop:3}}>{u}</div>
                </div>
              ))}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:1,marginBottom:20,border:"1px solid #1e1a16",borderTop:"none",borderRadius:"0 0 6px 6px",overflow:"hidden"}}>
              {[{l:"連続",v:streak,u:"日"},{l:"最高連続",v:bestStreak,u:"日"},{l:"1日平均",v:(()=>{if(sessions.length===0)return 0;const first=Object.keys(byDate).sort()[0];const d1=new Date(first),d2=new Date(todayStr());const days=Math.max(1,Math.round((d2-d1)/(1000*60*60*24))+1);return Math.round(totalAll/60/days);})(),u:"分"}].map(({l,v,u},i)=>(
                <div key={l} style={{background:"#0d0c09",padding:"12px 6px",textAlign:"center",borderRight:i<2?"1px solid #1e1a16":"none",borderTop:"1px solid #1e1a16"}}>
                  <div style={{fontSize:9,letterSpacing:2,color:"#3a3020",marginBottom:4,fontFamily:"'Cormorant SC',serif"}}>{l}</div>
                  <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:24,fontWeight:300,color:"#a89070",lineHeight:1}}>{v}</div>
                  <div style={{fontSize:9,color:"#3a3020",marginTop:3}}>{u}</div>
                </div>
              ))}
            </div>

            <div style={{background:"#0f0e0a",border:"1px solid #1a1610",borderRadius:8,padding:"14px 16px",marginBottom:24}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
                <div style={{fontSize:11,letterSpacing:3,color:"#4a3a2a",fontFamily:"'Cormorant SC',serif"}}>1日の目標</div>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  {[60,90,120,180].map(m=>(
                    <button key={m} onClick={()=>saveDailyGoal(m)} style={{background:dailyGoal===m?"#1a1510":"none",border:"1px solid "+(dailyGoal===m?"#c9a87a":"#2a2520"),color:dailyGoal===m?"#c9a87a":"#4a3a2a",borderRadius:4,padding:"4px 10px",cursor:"pointer",fontFamily:"'Cormorant Garamond',serif",fontSize:13}}>{m}</button>
                  ))}
                  <span style={{fontSize:11,color:"#4a3a2a"}}>分</span>
                </div>
              </div>
              {dailyGoal>0&&(
                <div style={{marginTop:10}}>
                  <div style={{height:2,background:"#1a1814",borderRadius:1,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${Math.min(todayTotal/(dailyGoal*60),1)*100}%`,background:"linear-gradient(to right,#c9a87a,#e8d4a8)",borderRadius:1,transition:"width .6s"}}/>
                  </div>
                  <div style={{fontSize:10,color:"#3a3020",marginTop:5,textAlign:"right",letterSpacing:1}}>{Math.round(todayTotal/60)}分 / {dailyGoal}分</div>
                </div>
              )}
            </div>

            <DustMountain totalMinutes={Math.floor(totalAll/60)} totalAll={totalAll}/>

            {(()=>{
              const totalHours=totalAll/3600;
              const goal=totalHours>=1000?10000:1000;
              const remaining=Math.max(0,goal-totalHours);
              const progress=Math.min(totalHours/goal,1);
              const label=goal===1000?"1000時間チャレンジ":"1万時間チャレンジ";
              const unlocked=goal===10000;
              return(
                <div style={{background:"#0f0e0a",border:"1px solid "+(unlocked?"#2a3a2a":"#1a1610"),borderRadius:8,padding:"16px",marginBottom:24}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:6}}>
                    <div style={{fontSize:11,letterSpacing:3,color:unlocked?"#4a6a4a":"#4a3a2a",fontFamily:"'Cormorant SC',serif"}}>{unlocked&&<span style={{marginRight:6}}>🔓</span>}{label}</div>
                    <div style={{fontSize:11,color:"#4a3a2a",letterSpacing:1}}>累計 <span style={{color:"#a89070",fontFamily:"'Cormorant Garamond',serif",fontSize:16}}>{Math.floor(totalHours)>0?`${Math.floor(totalHours)}時間`:""}{Math.round((totalHours%1)*60)}分</span></div>
                  </div>
                  <div style={{height:3,background:"#1a1814",borderRadius:2,overflow:"hidden",marginBottom:6}}>
                    <div style={{height:"100%",width:`${progress*100}%`,background:unlocked?"linear-gradient(to right,#4a6a4a,#8a9a7a)":"linear-gradient(to right,#c9a87a,#e8d4a8)",borderRadius:2,transition:"width .6s"}}/>
                  </div>
                  <div style={{fontSize:10,color:"#2a3020",textAlign:"right",letterSpacing:1}}>残り {Math.floor(remaining)}時間{Math.round((remaining%1)*60)}分 / {goal.toLocaleString()}時間</div>
                </div>
              );
            })()}

            <div style={{background:"#0f0e0a",border:"1px solid #1a1610",borderRadius:8,padding:"16px 14px",marginBottom:24,overflowX:"auto"}}>
              <div style={{fontSize:11,letterSpacing:3,color:"#4a3a2a",marginBottom:12,fontFamily:"'Cormorant SC',serif"}}>過去1年</div>
              <div style={{display:"flex",marginLeft:18,marginBottom:4}}>
                {(()=>{const ls=[];let lm=-1;heatWeeks.forEach((w,i)=>{const m=new Date(w[0].date).getMonth();ls.push(m!==lm?<div key={i} style={{fontSize:9,color:"#4a3a2a",width:11,flexShrink:0,overflow:"visible",whiteSpace:"nowrap"}}>{MONTHS[m]}</div>:<div key={i} style={{width:11,flexShrink:0}}/>);if(m!==lm)lm=m;});return ls;})()}
              </div>
              <div style={{display:"flex",gap:1}}>
                <div style={{display:"flex",flexDirection:"column",gap:1,marginRight:3}}>
                  {["日","月","火","水","木","金","土"].map((d,i)=><div key={d} style={{width:14,height:10,fontSize:8,color:i%2===1?"#4a3a2a":"transparent",display:"flex",alignItems:"center"}}>{d}</div>)}
                </div>
                {heatWeeks.map((w,wi)=>(
                  <div key={wi} style={{display:"flex",flexDirection:"column",gap:1}}>
                    {w.map((c,di)=><div key={di} title={c.inRange?`${c.date} ${c.mins}分`:""} style={{width:10,height:10,borderRadius:2,background:c.inRange?heatColor(c.mins):"transparent",opacity:c.inRange?1:0}}/>)}
                  </div>
                ))}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:4,marginTop:10,justifyContent:"flex-end"}}>
                <span style={{fontSize:9,color:"#3a2a1a"}}>少</span>
                {[0,5,15,25,35].map(m=><div key={m} style={{width:10,height:10,borderRadius:2,background:heatColor(m)}}/>)}
                <span style={{fontSize:9,color:"#3a2a1a"}}>多</span>
              </div>
            </div>

            <div style={{background:"#0f0e0a",border:"1px solid #1a1610",borderRadius:8,padding:"20px 16px",marginBottom:24}}>
              <div style={{fontSize:11,letterSpacing:3,color:"#4a3a2a",marginBottom:16,fontFamily:"'Cormorant SC',serif"}}>過去14日間</div>
              <div style={{display:"flex",alignItems:"flex-end",gap:4,height:80}}>
                {last14.map(date=>{
                  const val=byDate[date]||0,h=Math.max((val/maxV)*72,val>0?4:0),it=date===todayStr();
                  return(<div key={date} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                    <div style={{width:"100%",height:72,display:"flex",alignItems:"flex-end"}}>
                      <div style={{width:"100%",height:h,background:it?"linear-gradient(to top,#c9a87a,#e8d4a8)":"linear-gradient(to top,#3a3020,#5a4a30)",borderRadius:"2px 2px 0 0",transition:"height .6s"}}/>
                    </div>
                    <div style={{fontSize:9,color:it?"#c9a87a":"#3a2a1a"}}>{getDayLabel(date)}</div>
                  </div>);
                })}
              </div>
            </div>

            <div style={{fontFamily:"'Cormorant SC',serif",fontSize:11,letterSpacing:3,color:"#4a3a2a",marginBottom:12}}>履歴</div>
            {sessions.length===0?(
              <div style={{color:"#3a2a1a",fontSize:14,textAlign:"center",padding:20}}>まだ記録がありません</div>
            ):(
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {sessions.slice(0,30).map(s=>(
                  <div key={s.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",background:"#0f0e0a",border:"1px solid #1a1610",borderRadius:6}}>
                    <div style={{color:"#5a4a3a",fontSize:13}}>{s.date}</div>
                    <div style={{display:"flex",alignItems:"center",gap:12}}>
                      <div style={{color:"#a89070",fontFamily:"'Cormorant Garamond',serif",fontSize:18}}>{Math.round(s.duration/60)}<span style={{fontSize:12,color:"#5a4a3a"}}>分</span></div>
                      <button onClick={()=>handleDeleteSession(s.id)} style={{background:"none",border:"none",color:"#3a2520",cursor:"pointer",fontSize:16,lineHeight:1,padding:"2px 4px"}}>×</button>
                    </div>
                  </div>
                ))}
              </div>
            )}

            <div style={{marginTop:32,paddingTop:24,borderTop:"1px solid #1a1610",display:"flex",flexDirection:"column",gap:10}}>
              <div style={{fontSize:11,letterSpacing:3,color:"#2a2018",fontFamily:"'Cormorant SC',serif",marginBottom:4}}>設定</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                <button onClick={()=>{const data=JSON.stringify(sessions,null,2);const blob=new Blob([data],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`samatha_backup_${todayStr()}.json`;a.click();URL.revokeObjectURL(url);}} style={{background:"none",border:"1px solid #2a2520",color:"#5a4a3a",borderRadius:4,padding:"7px 16px",cursor:"pointer",fontFamily:"'Cormorant Garamond',serif",fontSize:13,letterSpacing:1}}>↓ エクスポート</button>
                <label style={{background:"none",border:"1px solid #2a2520",color:"#5a4a3a",borderRadius:4,padding:"7px 16px",cursor:"pointer",fontFamily:"'Cormorant Garamond',serif",fontSize:13,letterSpacing:1}}>
                  ↑ インポート
                  <input type="file" accept=".json" style={{display:"none"}} onChange={(e)=>{const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=(ev)=>{try{const imported=JSON.parse(ev.target.result);if(Array.isArray(imported)){save(imported);alert(`${imported.length}件インポートしました`);}}catch{alert("読み込みに失敗しました");}};reader.readAsText(file);e.target.value="";}}/>
                </label>
                <button onClick={()=>{if(bellTesting)return;setBellTesting(true);try{getAudio().resume();}catch{}playEndBell(audioRef.current||getAudio(),3000);setTimeout(()=>setBellTesting(false),3000+5*1200+500);}} style={{background:"none",border:"1px solid #2a2520",color:bellTesting?"#2a2520":"#5a4a3a",borderRadius:4,padding:"7px 16px",cursor:bellTesting?"not-allowed":"pointer",fontFamily:"'Cormorant Garamond',serif",fontSize:13,letterSpacing:1}}>🔔 {bellTesting?"確認中...":"アラーム確認"}</button>
              </div>
            </div>
          </div>
        )}
      </div>

      {pendingSession&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.7)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div style={{background:"#0f0e0a",border:"1px solid #2a2520",borderRadius:12,padding:"32px 24px",width:"100%",maxWidth:320,textAlign:"center"}}>
            <div style={{fontFamily:"'Cormorant SC',serif",fontSize:11,letterSpacing:3,color:"#5a4a3a",marginBottom:16}}>セッション終了</div>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:36,fontWeight:300,color:"#d4b896",marginBottom:8}}>
              {Math.floor(pendingSession.duration/60)}<span style={{fontSize:16,color:"#7a6a5a"}}>分</span>
              {Math.round(pendingSession.duration%60)>0&&<span style={{fontSize:20}}>{Math.round(pendingSession.duration%60)}<span style={{fontSize:14,color:"#7a6a5a"}}>秒</span></span>}
            </div>
            <div style={{fontSize:12,color:"#3a3020",marginBottom:28,letterSpacing:1}}>記録しますか？</div>
            <div style={{display:"flex",gap:12,justifyContent:"center"}}>
              <button className="ab sv" onClick={handlePendingSave}>保存</button>
              <button className="ab x" onClick={()=>setPendingSession(null)}>破棄</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
